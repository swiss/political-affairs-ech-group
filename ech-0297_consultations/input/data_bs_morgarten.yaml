#     https://media.bs.ch/original_file/443dec83b02cbf84b6e8467e5401f3340fc7fd9e/vernehmlassung-entwicklungskonzept-stadtraum-morgarten-begle.pdf
#   - Konzeptentwurf:
#     https://media.bs.ch/original_file/62d285ed577503f957b6551ceeb2fe4ef458ac9c/entwicklungskonzept-stadtraum-morgartenring-entwurf-vernehml.pdf
#   - E-Mitwirkungsplattform:
#     https://mitwirkung.bs.ch/de/vernehmlassung-zum-entwicklungskonzept-stadtraum-morgartenring
#
# Stand der Daten: 2026-05-11 (Vernehmlassung läuft noch bis 2026-05-12).

global_uri: con:container/example/morgartenring

consultations:
  - global_uri: con:morgartenring-2026
    identifier: "V 2026-02-10"

    title:
      - text: "Entwicklungskonzept Stadtraum Morgartenring"
        language: de

    description:
      - text: |
          Für die geplante S-Bahn-Haltestelle Basel Neuallschwil
          (Inbetriebnahme bis Ende 2030, Teil des Ausbauschrittes 2035
          des STEP) wurde gemeinsam mit dem Kanton Basel-Stadt, der
          Gemeinde Allschwil und dem Kanton Basel-Landschaft ein
          Entwicklungskonzept für den Stadtraum Morgartenring
          ausgearbeitet. Es zeigt auf, wie die Haltestelle in den
          Stadtraum und das ÖV-Netz integriert und das entstehende
          Entwicklungspotenzial genutzt werden kann.
        language: de

    status: open

    landing_page: "https://www.bs.ch/regierungsrat/vernehmlassungen#entwicklungskonzept-stadtraum-morgartenring"

    publication_date: "2026-02-10T00:00:00+01:00"
    start_date: "2026-02-12T00:00:00+01:00"
    submission_deadline: "2026-05-12T23:59:59+02:00"

