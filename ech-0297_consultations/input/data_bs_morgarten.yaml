# Beispiel: Öffentliche Vernehmlassung "Entwicklungskonzept Stadtraum
# Morgartenring", durchgeführt gemeinsam vom Kanton Basel-Stadt, der
# Gemeinde Allschwil und dem Kanton Basel-Landschaft.
