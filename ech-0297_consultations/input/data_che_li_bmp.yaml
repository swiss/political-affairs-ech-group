      - text: |
          Abkommen zwischen dem Schweizerischen Bundesrat und der
          Regierung des Fürstentums Liechtenstein über die gegenseitige
          Anerkennung von Berufsmaturitätszeugnissen
        language: de
      - text: |
          Accord entre le Conseil fédéral suisse et le gouvernement de
          la Principauté du Liechtenstein sur la reconnaissance
          mutuelle des certificats de maturité professionnelle
        language: fr
      - text: |
          Accordo tra il Consiglio federale svizzero e il Governo del
          Principato del Liechtenstein sul riconoscimento reciproco
          degli attestati di maturità professionale
        language: it

    description:
      - text: |
          Der Entwurf des Abkommens sieht die gegenseitige Anerkennung
          von Berufsmaturitätszeugnissen zwischen den beiden
          Vertragsparteien vor.
        language: de
      - text: |
          Le projet d'accord prévoit la reconnaissance des certificats
          de maturité professionnelle entre les deux parties à
          l'accord.
        language: fr
      - text: |
          Il progetto di accordo prevede il riconoscimento dei
          certificati di maturità professionale tra le due parti
          dell'accordo.
        language: it

