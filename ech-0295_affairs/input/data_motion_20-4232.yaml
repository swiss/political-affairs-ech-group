        texts:
          - text: |
              Die Pflicht zur Deklaration der Produktionsmethoden von
              Nahrungsmitteln wurde bereits in mehreren parlamentarischen
              Vorstössen behandelt. [...] Eine Deklarationspflicht müsste
              zudem die Anforderungen der im Recht der Welthandels­
              organisation (WTO) vorgesehenen Nichtdiskriminierung
              erfüllen. [...]
            text_language: de
            text_type: response
            text_origin: original
            text_date: "2020-11-25"
          - text: |
              La déclaration obligatoire des méthodes de production des
              denrées alimentaires a déjà fait l'objet de plusieurs
              interventions parlementaires. [...]
            text_language: fr
            text_type: response
            text_origin: translated
            text_date: "2020-11-25"
          - text: "Der Bundesrat beantragt die Ablehnung der Motion."
