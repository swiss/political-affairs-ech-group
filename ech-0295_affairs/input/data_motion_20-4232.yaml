                text_language: de
          sponsor_role: sponsor
          start_date: "2020-09-25"
        - actor:
            global_uri: actor:person/4246
            name:
              - text: "Mitunterzeichner:in 1"
                text_language: de
          sponsor_role: cosponsor
          start_date: "2020-09-25"
        - actor:
            global_uri: actor:person/4058
            name:
              - text: "Mitunterzeichner:in 2"
                text_language: de
          sponsor_role: cosponsor
          start_date: "2020-09-25"

      texts:
        - text: |
            Der Bundesrat wird beauftragt, eine Deklarationspflicht für
            Kokosprodukte einzuführen, die unter Einbezug von Affen
            produziert wurden. Der Code zur Nachverfolgbarkeit der
            Herkunft soll dabei um einen für Konsumierende klaren Hinweis
            auf die tierquälerische Produktion ergänzt werden.
          text_language: de
          text_type: submitted
          text_origin: original
          text_date: "2020-09-25"
        - text: |
            Wie der Tagesspiegel vom 10. Juli 2020 und verschiedene
            weitere Medien berichteten, herrscht eine grosse
            Tierschutzproblematik im Zusammenhang mit der Ernte von
            Kokosnüssen in Thailand. Junge Affen werden in Thailand
            angekettet, gewaltsam trainiert und gezwungen, Kokosnüsse zu
            pflücken. [...] Da ein Code jedoch für Transparenz nicht
            ausreicht, ist eine klare Deklaration erforderlich wie sie
            bei anderen Produkten wie Käfigeiern bereits üblich ist.
          text_language: de
          text_type: reasoning
          text_origin: original
          text_date: "2020-09-25"

