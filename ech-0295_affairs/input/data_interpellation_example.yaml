      sponsorship:
        - actor:
            global_uri: actor:person/demo-mp
            name:
              - text: "Demo MP"
                text_language: de
          sponsor_role: sponsor
          start_date: "2024-03-04"

      texts:
        - text: |
            Ich frage den Bundesrat: Welche Massnahmen plant er zur
            Reduktion der Verkehrsbelastung in Agglomerationen?
