        responder:
          global_uri: actor:department/CHE/bundesrat
          name:
            - text: "Bundesrat"
              text_language: de
        texts:
          - text: |
              Der Bundesrat verweist auf den am 15. Februar 2024
              verabschiedeten Bericht zur Verkehrsentlastung in
              Agglomerationen [...]
            text_language: de
            text_type: response
            text_origin: original
            text_date: "2024-05-22"

    lifecycle_flags:
      - flag_date: "2024-03-04"
        urgent: true
        remark: "Als dringliche Interpellation eingereicht."

    current_state:
      global_uri: aff:interpellation/24.demo/state/current
