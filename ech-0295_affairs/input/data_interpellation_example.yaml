global_uri: aff:container/example/interpellation-demo

affairs:
  - affair_type: interpellation
    global_uri: aff:interpellation/24.demo
    affair_number: "24.DEMO"

    title:
      - text: "Demo-Interpellation zur Verkehrslage"
        text_language: de
        text_type: title
        text_origin: original
        text_date: "2024-03-04"
      - text: "Interpellation de dûˋmonstration sur la situation du trafic"
        text_language: fr
        text_type: title
        text_origin: translated
        text_date: "2024-03-04"

    submission:
      global_uri: aff:interpellation/24.demo/submission
      submission_date: "2024-03-04"
