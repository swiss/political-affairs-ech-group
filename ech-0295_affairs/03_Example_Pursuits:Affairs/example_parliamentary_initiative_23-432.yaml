	 texts:
          - text_type: main_text
            value:
              - language: de
                text: |
                  Das Bundespersonalgesetz und weitere spezifische Erlasse sind so
                  anzupassen, dass Mitglieder der Geschäftsleitung (respektive der
                  obersten operativen Stufe) und des Verwaltungsrates (respektive
                  des übergeordneten strategischen Organs) der Bundesverwaltung und
                  der bundesnahen Unternehmen und Anstalten keine
                  Abgangsentschädigungen erhalten. Nicht als Abgangsentschädigungen
                  gelten Vergütungen, die bis zur Beendigung des Vertrags geschuldet
                  sind.
            document_url: NULL
          - text_type: reasoning
            value:
              - language: de
                text: |
		    Artikel 735c Ziffer 1 OR (vormals: Art. 20 Ziff. 1 VegüV) verbietet in
		    Umsetzung der 2013 angenommenen Volksinitiative "gegen die Abzockerei" seit
		    bald zehn Jahren Abgangsentschädigungen an die Mitglieder der Geschäftsleitung
		    und des Verwaltungsrates von börsenkotierten Gesellschaften. Solche "goldenen
		    Fallschirme" sind jedoch weiterhin möglich für das Topkader der
		    Bundesverwaltung und von bundesnahen Betrieben. Solcherlei verpönte Vergütungen
		    werden beim Bund auch weiterhin regelmässig ausgeschüttet, so in den letzten
		    Jahren bei Armasuisse, beim Bundesamt für Statistik, Bundesamt für Migration
		    (heute SEM), Eidgenössischen Personalamt, Bundesamt für Bauten und Logistik,
		    bei der Suva, Billag, SRG, Armee, der Schweizerischen Post usw. Aktuell macht
		    der abgetretene Direktor des Bundesamt für Zoll und Grenzsicherheit von sich
		    reden, der eine Abgangsentschädigung von 12 Monatslöhnen oder grob 330 000
		    Franken erhält. Es ist völlig unbegründet, dass das oberste Management von
		    Bundesbetrieben weiterhin von dieser Vergütungsart profitieren soll. Die
		    ordentlichen Entschädigungen sind hier bereits sehr hoch und übersteigen gar
		    regelmässig das Gehalt eines Bundesrates. Die "Schleudersitzprämie" ist hier
		    quasi bereits im ordentlichen Lohn mitinbegriffen. In Anlehnung an das Verbot
		    bei privatrechtlichen Gesellschaften soll es fortan auch für das Topkader von
		    Bundesbetrieben Geltung erlangen. Einer vergleichbaren parlamentarischen
		    Initiative (18.428 s pa. iv. Minder. Bundesbetriebe und bundesnahe
		    Unternehmungen. Keine Abgangsentschädigung ans Topkader) wurde am 12. Oktober
		    2018 von der SPK-S (mit 5 zu 3 Stimmen bei 4 Enthaltungen) und am 31. Januar
		    2019 von der SPK-N (mit 18 zu 5 Stimmen) Folge gegeben. Die SPK-N wollte das
		    Anliegen in die Vorlage zur Umsetzung der parlamentarischen Initiative 16.438 n
		    pa. iv. Leutenegger Oberholzer "Angemessene Bezüge und Stopp der Lohnexzesse
		    bei den Bundes- und bundesnahen Unternehmen" einbauen, die eine Lohnobergrenze
		    für das oberste Führungspersonal von Bundes- und bundesnahen Unternehmungen
		    forderte. Mit zweimaligem Nichteintreten auf die Vorlage 16.438 durch den
		    Ständerat wurde dabei auch gleichzeitig die pa. iv. 18.428 abgeschrieben und
		    damit die Abschaffung der Abgangsentschädigungen beim Bund verhindert.
        step_remarks: NULL

