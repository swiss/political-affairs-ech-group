      # 8) STELLUNGNAHME DES BUNDESRATES ZUM ENTWURF ----------------------------
      - step_uid: "urn:parlch:business:20230432:step:stellungnahme-br"
        step_type: executive_response
        as_of_date: 2026-04-15
        step_status: closed
        phase: parliamentary
        affair_stage: ongoing
        responder:
          group_id: "parlch:executive:bundesrat"
          name: "Bundesrat"
        response_date: 2026-04-15
        recommendation: reject      # "beantragt die Ablehnung der Vorlage"
        texts:
          - text_type: background
            value:
              - language: de
                text: |
		    Abgangsentschädigungen an das Topkader der Bundesverwaltung sind immer wieder
		    Gegenstand politischer und öffentlicher Diskussionen. Am 30. Mai 2023 reichte
		    der damalige Ständerat Thomas Minder eine parlamentarische Initiative ein.
		    Diese fordert ein Verbot von Abgangsentschädigungen an Mitglieder der
		    Geschäftsleitung (respektive der obersten operativen Stufe) und des
		    Verwaltungsrates (respektive des übergeordneten strategischen Organs) der
		    Bundesverwaltung und der Unternehmen und Anstalten des Bundes. Nach dem
		    Ausscheiden von Thomas Minder aus dem Ständerat wurde die parlamentarische
		    Initiative von Ständerat Jakob Stark aufgenommen. Die Staatspolitische
		    Kommission des Ständerates (SPK-S) nahm an ihrer Sitzung vom 9. April 2024 die
		    Vorprüfung der Initiative vor und beantragte ihrem Rat, der Initiative keine
		    Folge zu geben. Ausschlaggebend dafür war neben den, gemessen am gesamten
		    Personalaufwand, relativ geringen Beträgen insbesondere die Anerkennung der
		    Abgangsentschädigungen als Instrument einer flexiblen Personalpolitik. Denn
		    Abgangsentschädigungen sind im Bundespersonalrecht für bestimmte Funktionen im
		    Zusammenhang mit vereinfachten Kündigungen vorgesehen. Der Ständerat folgte der
		    Minderheit seiner Kommission und gab der Initiative an seiner Sitzung vom 6.
		    Juni 2024 Folge. Auch die Staatspolitische Kommission des Nationalrates stimmte
		    der parlamentarischen Initiative zu (Sitzung vom 14. November 2024). In der
		    Folge wurde ein Entwurf für eine Änderung des Bundespersonalgesetzes vom 24.
		    März 20003 (BPG) sowie der entsprechenden Spezialgesetze und ein erläuternder
		    Bericht erarbeitet. Diesem Vorentwurf und dem dazugehörigen Bericht stimmte die
		    Kommission am 17. Februar 2026 mit 10 zu 0 Stimmen und einer Enthaltung zu. Auf
		    die Durchführung einer Vernehmlassung wurde verzichtet. Der Bundesrat wurde
		    jedoch gebeten, die Vorlage auch den bundesnahmen Unternehmen und Anstalten für
		    eine Stellungnahme zukommen zu lassen. Die SPK-S beantragt dem Ständerat, der
		    Vorlage zuzustimmen. Mit Schreiben der SPK-S vom 19. Februar 2026 wurde der
		    Bundesrat zur Stellungnahme eingeladen. Die Stellungnahmen der bundesnahen
		    Unternehmen und Anstalten sind in die Stellungnahme des Bundesrates zu
		    integrieren.
                  
          - text_type: reasoning
            value:
              - language: de
                text: |
		    Der Bundesrat lehnt das Verbot von Abgangsentschädigungen ans Topkader ab. Er
		    unterstützt das Ansinnen, dass diese massvoll einzusetzen sind, vertritt jedoch
		    die Ansicht, dass Abgangsentschädigungen situativ angebracht sein können. Diese
		    konkreten Fälle sind im BPG und in der Bundespersonalverordnung vom 3. Juli
		    20014 (BPV) festgehalten. Die Vorlage zielt auf die Abgangsentschädigungen im
		    Zusammenhang mit vereinfachten Kündigungen: Gemäss BPV können
		    Abgangsentschädigungen insbesondere für die obersten Kader (Staatssekretärinnen
		    oder Staatssekretäre, Amtsdirektorinnen oder Amtsdirektoren,
		    Generalsekretärinnen oder Generalsekretäre etc.) im Zusammenhang mit einer
		    vereinfachten Kündigung infolge Wegfalls der gedeihlichen Zusammenarbeit oder
		    Wegfalls des Willens der Departementsvorsteherin oder des
		    Departementsvorstehers zur Zusammenarbeit ausgerichtet werden (Art. 26 Abs. 1
		    und 3 sowie Art. 78 Abs. 2 BPV). In diesen Fällen braucht es keinen sachlichen
		    Grund und keine weitere Begründung für die Kündigung. Die BPV sieht zwar vor,
		    dass eine Abgangsentschädigung auch dann ausgerichtet werden kann, wenn die
		    Auflösung des Arbeitsverhältnisses einvernehmlich erfolgt (Art. 19 Abs. 4 BPG
		    in Verbindung mit Art. 78 Abs. 2bis BPV); aber auch bei einer einvernehmlichen
		    Auflösung muss der Anstoss zur Auflösung des Arbeitsverhältnisses vom
		    Arbeitgeber ausgehen. Bei einem freiwilligen Rücktritt gibt es keine
		    Abgangsentschädigung. Die Abgangsentschädigung ist somit als Gegenleistung für
		    das Risiko der vereinfachten Kündigung zu betrachten. Damit soll ein
		    reibungsloser Wechsel an der Spitze von Verwaltungseinheiten ermöglicht und der
		    Entstehung langwieriger und kostspieliger Rechtsstreitigkeiten vorgebeugt
		    werden. Die Anwendungsfälle entstehen in der Regel bei einem Wechsel der
		    Departementsvorsteherin oder des Departementsvorstehers. Bei einem Wegfall der
		    Abgangsentschädigungen dürfte die erleichterte Kündigung aus Sicht der
		    Arbeitnehmenden zu einem grösseren Risiko werden. Ein
		    Abgangsentschädigungsverbot ohne alternative Massnahmen dürfte sich somit
		    negativ auf die Attraktivität von Topkaderpositionen auswirken. Zumal die
		    Bundesverwaltung in diesen Kaderbereichen in der Honorierung mit vergleichbaren
		    Unternehmen der Privatwirtschaft nicht Schritt halten kann, wie die bisherigen
		    Vergleichsstudien5 aufzeigen. Der Bundesrat erachtet das Instrument der
		    vereinfachten Kündigung nach wie vor als wichtig und zielführend. Er anerkennt,
		    dass ein Ausgleich für dieses Risiko anzubieten ist. Aus seiner Perspektive
		    erscheint eine Abschaffung der Abgangsentschädigung ohne die Implementierung
		    alternativer Massnahmen daher personalpolitisch nicht adäquat. In der
		    Privatwirtschaft haben sich im Zuge der sogenannten «Abzocker-Initiative», mit
		    der Abgangsentschädigungen für börsenkotierte Unternehmen verboten wurden,
		    ebenfalls alternative Mechanismen wie längere Kündigungsfristen,
		    Freistellungsfristen, Cooling-off-Perioden etc. etabliert. Im Falle der Annahme
		    der parlamentarischen Initiative behält sich der Bundesrat daher vor,
		    alternative Möglichkeiten zu prüfen und diese auf Verordnungsstufe zu regeln.
		    Der Bundesrat ist jedoch überzeugt, dass die aktuelle Regelung der
		    Abgangsentschädigung am zielführendsten ist. Die geltenden Rechtsgrundlagen
		    stellen durch die klare Definition der möglichen Anwendungsbereiche, der
		    betroffenen Personalkategorien und der Höhe der Entschädigung sicher, dass
		    Abgangsentschädigungen nur in begründeten Einzelfällen ausgerichtet werden
		    können. Ausserdem besteht eine Rückzahlungspflicht für Abgangsentschädigungen,
		    welche der Bundesrat auf den 1. Januar 2026 nochmals erweitert hat (Art. 78a
		    BPV). Zudem wird im Rahmen der Berichterstattung zum Personalmanagement
		    transparent über die Anwendung dieses Instrumentes informiert. Bei allfälligen
		    Alternativen müsste erst geprüft werden, ob und wie dies gewährleistet werden
		    kann.
                  
		    Gemäss Schreiben der SPK-S vom 19. Februar 2026 sollen in die Stellungnahme des
		    Bundesrates auch die Meinungen der von der Vorlage betroffenen bundesnahen
		    Unternehmen und Anstalten einfliessen. Die bundesnahen Unternehmen und
		    Anstalten wurden mit Schreiben der Direktorin des Eidgenössischen Personalamtes
		    vom 20. Februar 2026 via die Generalsekretärinnen und Generalsekretäre der
		    jeweils zuständigen Departemente zur Stellungnahme eingeladen. Die beim
		    Eidgenössischen Personalamt eingegangenen Stellungnahmen ergeben folgendes
		    Bild: Das Interesse der bundesnahen Unternehmen und Anstalten an der Vorlage
		    ist unterschiedlich und hängt davon ab, wie stark die Einheit und ihr Handeln
		    davon betroffen sind. In den meisten Einheiten sind keine vertraglich
		    vereinbarten oder statutarisch festgelegten Abgangsentschädigungen für die
		    Mitglieder des Verwaltungsrats oder der Geschäftsleitung vorgesehen. Diese
		    Einheiten nehmen denn auch eine neutrale Haltung zur Vorlage ein. In einzelnen
		    Einheiten ist die Ausrichtung von Abgangsentschädigungen aktuell möglich. Diese
		    stehen entweder – wie in der Bundesverwaltung – im Zusammenhang mit
		    vereinfachten Kündigungen oder können bei einvernehmlichen Auflösungen des
		    Arbeitsverhältnisses eingesetzt werden, um eine reibungslose Ablösung zu
		    ermöglichen und langwierige Rechtsstreitigkeiten zu vermeiden. Die betroffenen
		    Einheiten teilen die Einschätzung des Bundesrates und lehnen das
		    Abgangsentschädigungsverbot ab. In mehreren bundesnahen Unternehmen und
		    Anstalten sind alternative Instrumente für die vereinfachte Vertragsauflösung
		    mit Mitgliedern der Geschäftsleitung im Einsatz, wie beispielsweise
		    Lohnfortzahlungen während einer Freistellung. Diese Einheiten weisen explizit
		    darauf hin, dass solche Zahlungen weiterhin zulässig sind und nicht unter das
		    Abgangsentschädigungsverbot gemäss der vorliegenden parlamentarischen
		    Initiative fallen. Gleiches gilt für die Karenzfrist (cooling-off) für Behörden
		    mit Aufsichts- und Regulierungsfunktionen und damit verbundene Entschädigungen.
		    
           - text_type: recommendation
             value:
               - language: de
                 text: |
                   Der Bundesrat beantragt die Ablehnung der Vorlage.
        step_remarks: NULL
	 
