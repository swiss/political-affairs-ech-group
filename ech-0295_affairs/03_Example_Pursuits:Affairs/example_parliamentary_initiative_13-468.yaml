        texts:
          - text_type: main_text
            value:
              - language: de
                text: |
                  Gestützt auf Artikel 160 Absatz 1 der Bundesverfassung und
                  Artikel 107 des Parlamentsgesetzes reichen wir folgende
                  parlamentarische Initiative ein: Die Bundesverfassung ist wie
                  folgt zu ändern:
                  Art. 14 Recht auf Ehe, Lebensgemeinschaft (neu) und Familie
                  Abs. 1: Das Recht auf Ehe, Lebensgemeinschaft (neu) und Familie
                  ist gewährleistet.
                  Abs. 2: Die gesetzlich geregelten Lebensgemeinschaften stehen
                  Paaren unabhängig von ihrem Geschlecht oder ihrer sexuellen
                  Orientierung offen.
                  Art. 38 Abs. 1 erster Satz: Der Bund regelt Erwerb und Verlust
                  der Bürgerrechte durch Abstammung, gesetzlich geregelte
                  Lebensgemeinschaft (neu) und Adoption. ...
            document_url: NULL
          - text_type: reasoning
            value:
              - language: de
                text: |
		    Die parlamentarische Initiative fordert den Gesetzgeber auf, alle rechtlich
		    geregelten Lebensgemeinschaften für alle Paare zu öffnen, ungeachtet ihres
		    Geschlechts oder ihrer sexuellen Orientierung. Auch gleichgeschlechtliche Paare
		    sollten heiraten können, und ungleichgeschlechtliche Paare sollten (wie in
		    Frankreich) eine eingetragene Partnerschaft begründen können. Der
		    vorgeschlagene Artikel 14 Absatz 2 der Bundesverfassung hält dies fest. In
		    Artikel 14 Absatz 1 wird der Begriff "Ehe" durch den umfassenderen Begriff
		    Lebensgemeinschaft ersetzt. Dies ist notwendig, weil andere
		    Lebensgemeinschaften wie die eingetragene Partnerschaft und das Konkubinat den
		    gleichen Grundrechtsschutz verdienen wie die Ehe. Weiterhin nicht unter Artikel
		    14 Absatz 1 fällt ein blosses Zusammenleben mehrerer Personen etwa in einer
		    Wohngemeinschaft. Die Bestimmung verpflichtet den Gesetzgeber auch nicht,
		    homosexuellen Paaren die Adoption zu ermöglichen. In Artikel 38 Absatz 1 erster
		    Satz wird der Begriff "Heirat" durch den umfassenderen Begriff "(gesetzlich
		    geregelte) Lebensgemeinschaft" ersetzt. Menschen heiraten unter anderem, weil
		    sie ihre Lebensgemeinschaft auf eine dauerhafte Basis stellen wollen, sich
		    gegenseitig finanziell absichern und gegenüber der Gesellschaft ihre
		    Verbundenheit ausdrücken möchten. Einem Teil der Gesellschaft in der Schweiz
		    werden diese Rechte jedoch verweigert, ihnen steht eine Ehe zweiter Klasse in
		    Form der eingetragenen Partnerschaft zur Verfügung. Diese Deklassierung
		    aufgrund biologischer Unterschiede ist mit einem liberalen Gesellschaftsbild
		    und einem modernen Rechtsstaat unvereinbar. Deshalb haben weltweit weit über
		    ein Dutzend Länder, darunter Frankreich, Spanien, Portugal, Belgien, die
		    Niederlande, Norwegen, Schweden, Dänemark und Island, die gleichgeschlechtliche
		    Ehe legalisiert. Mit der parlamentarischen Initiative wird nicht beabsichtigt,
		    den Kirchen und anderen Religionsgemeinschaften vorzuschreiben, wer bei ihnen
		    vor den Altar treten darf. Sie bestimmen dies weiterhin selber.
            document_url: NULL
        step_remarks: NULL

