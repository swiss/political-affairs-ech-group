        responder:
          group_id: "parlch:executive:bundesrat"
          name: "Bundesrat"
        response_date: 2020-01-29
        recommendation: accept      
        texts:
          - text_type: background
            value:
              - language: de
                text: |
		    Am 5. Dezember 2013 reichte die Grünliberale Fraktion die parlamentarische
		    Initia- tive «Ehe für alle» mit folgendem Text ein: «Die Bundesverfassung ist
		    wie folgt zu ändern: Art. 14 Recht auf Ehe, Lebensgemeinschaft (neu) und
		    Familie Abs. 1 Das Recht auf Ehe, Lebensgemeinschaft (neu) und Familie ist
		    gewährleistet. Abs. 2 Die gesetzlich geregelten Lebensgemeinschaften stehen
		    Paaren unabhängig von ihrem Geschlecht oder ihrer sexuellen Orientie- rung
		    offen. Art. 38 Abs. 1 erster Satz Der Bund regelt Erwerb und Verlust der
		    Bürgerrechte durch Ab- stammung, («Heirat» streichen) gesetzlich geregelte
		    Lebensge- meinschaft (neu) und Adoption. …» Am 20. Februar 2015 gab die
		    Kommission für Rechtsfragen des Nationalrates (RK-N) der Initiative mit 12 zu 9
		    Stimmen bei 1 Enthaltung Folge. Die Kommission für Rechtsfragen des Ständerates
		    (RK-S) stimmte diesem Beschluss am 1. September 2015 mit 7 zu 5 Stimmen bei 1
		    Enthaltung zu. Am 16. Juni 2017 hat der Nationalrat die Frist zur Ausarbeitung
		    eines Erlassentwurfs bis zur Sommerses- sion 2019 verlängert. Am 5. Juli 2018
		    traf die RK-N den Grundsatzentscheid, die Öffnung der Ehe für Personen gleichen
		    Geschlechts auf dem Wege der Gesetzesänderung vorzunehmen. Zudem sprach sie
		    sich dafür aus, die Gesetzesrevision für die Öffnung des Rechtsin- stituts Ehe
		    nicht in einer einmaligen Revision, sondern in Etappen anzugehen. Die
		    Verwaltung wurde in der Folge beauftragt, zusammen mit externen Expertinnen und
		    Experten eine «Kernvorlage» auszuarbeiten. Am 14. Februar 2019 stimmte die RK-N
		    der von der Verwaltung erarbeiteten Kern- vorlage zu. Weiter beschloss sie,
		    auch eine Änderung der Bestimmungen über die Entstehung des Kindesverhältnisses
		    im Zivilgesetzbuch als eine «die Kernvorlage ergänzende Variante» in die
		    Vernehmlassung zu schicken. Mit dieser Änderung würde gleichgeschlechtlichen
		    weiblichen Ehepaaren der Zugang zur Samenspende ermöglicht. Die Vernehmlassung
		    dauerte vom 14. März bis zum 21. Juni 2019. Am 30. August 2019 hat die RK-N von
		    den Ergebnissen des Vernehmlassungsverfahrens Kenntnis genommen. Angesichts der
		    Stellungnahmen in der Vernehmlassung hat die Mehrheit der Kom- mission
		    entschieden, auf die Öffnung des Zugangs zur Samenspende für gleichge-
		    schlechtliche weibliche Ehepaare zu verzichten und die Thematik der Fortpflan-
		    zungsmedizin erst in einem nachfolgenden Schritt anzugehen. In der Folge hat
		    die RK-N an der Sitzung vom 30. August 2019 den vorliegenden Erlassentwurf und
		    Bericht mit 17 zu 7 Stimmen bei 1 Enthaltung verabschiedet. Eine Minderheit
		    verlangt hingegen nach wie vor die Öffnung des Zugangs zur Samenspende für
		    gleichgeschlechtliche weibliche Ehepaare. Eine zweite Minderheit beantragt
		    Nichteintreten. Gestützt auf Artikel 112 Absatz 3 des Parlamentsgesetzes vom
		    13. Dezember 20023 wurden Erlassentwurf und Bericht dem Bundesrat zur
		    Stellungnahme überwiesen.
		    
          - text_type: reasoning
            value:
              - language: de
                text: |
		    In den vergangenen Jahren hat sich der Bundesrat wiederholt für eine
		    Beseitigung der Ungleichbehandlung verschieden- und gleichgeschlechtlicher
		    Paare ausgespro- chen, entweder durch eine Angleichung der eingetragenen
		    Partnerschaft an die Ehe oder durch die Öffnung der Ehe für
		    gleichgeschlechtliche Paare.4 Der Bundesrat begrüsst deshalb den klaren
		    Entscheid der RK-N, die bestehende Ungleichbehand- lung zu beseitigen und das
		    Rechtsinstitut der Ehe für alle Paare zu öffnen. Weil die eingetragene
		    Partnerschaft als Pendant zur Ehe geschaffen wurde, erscheint es zudem
		    konsequent, dass künftig keine neuen eingetragenen Partnerschaften mehr
		    begründet werden können. Der Bundesrat begrüsst auch den Vorschlag der RK-N,
		    dass Paare, die bereits in einer eingetragenen Partnerschaft leben, die
		    Möglichkeit erhalten, ihre eingetragene Partnerschaft rasch und unbürokratisch
		    in eine Ehe umwandeln zu können. Die Einführung einer weiteren
		    Partnerschaftsform als Rechtsinstitut ausserhalb der Ehe und unabhängig von der
		    Geschlechterzusammen- setzung wird im Rahmen des Berichts zu einem möglichen
		    PACS für die Schweiz geprüft.5 Der Bundesrat schliesst sich auch den
		    rechtlichen Überlegungen der RK-N an, wonach die Öffnung der Ehe auf dem Weg
		    einer Gesetzesrevision erfolgen kann und dazu keine Revision der
		    Bundesverfassung6 erforderlich ist. Als sachgerecht erachtet der Bundesrat
		    schliesslich den Entscheid, die Revision in Etappen umzusetzen und in einem
		    ersten Schritt nur die für die Öffnung der Ehe unbedingt notwendigen Punkte zu
		    regeln. Die Erweiterung der Vorlage auf politisch heikle Fragen – wie zum
		    Beispiel die Regelung der Hinterlassenenrenten – könnte den Erfolg der Vorla-
		    ge als Ganzes gefährden oder jedenfalls ein Inkrafttreten um Jahre verzögern.
		    Auch wenn der Bundesrat das Anliegen der Minderheit betreffend die Öffnung des
		    Zugangs zur Samenspende für weibliche Ehepaare nachvollziehen kann, ist er mit
		    der Mehrheit der Kommission der Ansicht, dass es angebracht ist, diese Frage
		    erst in einem nächsten Schritt zu behandeln, damit die Vorlage nicht überladen
		    wird. Zu- dem wurde die Frage der Notwendigkeit einer Verfassungsrevision noch
		    nicht definitiv geklärt. Weiter sollen die Einwände, die in der Vernehmlassung
		    gegen die Einführung einer Mutterschaftsvermutung der Ehefrau der Mutter
		    vorgebracht wurden, unter dem Gesichtspunkt des Kindeswohls vertieft geprüft
		    werden. Es stellt sich insbesondere die Frage der Vereinbarkeit einer solchen
		    Vermutung mit dem verfassungsrechtlich garantierten Recht des Kindes auf
		    Kenntnis seiner Abstam- mung, etwa wenn die Samenspende in einem Land
		    durchgeführt wurde, in dem eine anonyme Spende möglich ist, oder wenn die
		    Zeugung auf natürlichem Weg erfolgt ist. In diesem letzten Fall stellt sich
		    zudem auch die Frage nach der rechtlichen Stellung des biologischen Vaters. Der
		    Bundesrat ist der Ansicht, dass diese heiklen Fragen in grundsätzlicher Weise
		    geklärt werden sollten, bevor eine neue Regelung eingeführt wird. Entsprechende
		    Arbeiten sind denn auch bereits am Laufen: Mit der Überweisung des Postulats
		    18.3714 «Überprüfung des Abstammungsrechts» der RK-S wurde der Bundesrat
		    beauftragt, den Reformbedarf im Abstammungsrecht zu prüfen und dem Parlament in
		    einem Bericht gegebenenfalls Empfehlungen für eine kohärente Gesamtreform zu
		    unterbreiten. Eine externe interdisziplinäre Gruppe von Expertinnen und
		    Experten wurde eingesetzt, die bis zum Sommer 2021 Empfehlun- gen formulieren
		    wird. Somit können die erwähnten Fragen in einem Gesamtkontext diskutiert und
		    angemessene Lösungen vorgeschlagen werden.
		    
