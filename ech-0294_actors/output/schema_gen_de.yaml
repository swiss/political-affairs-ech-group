id: https://ld.ech.ch/schema/0294/actors
name: actors-schema
title: Actors Schema
description: 'Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.

  '
annotations:
  description_de: 'Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.

    '
license: CC-BY
prefixes:
  linkml: https://w3id.org/linkml/
  act: https://ld.ech.ch/schema/0294/actors/
  dcterms: http://purl.org/dc/terms/
default_prefix: act
default_range: string
imports:
- linkml:types
- ../../ech-0292_meta/input/schema_common
classes:
  Container:
    tree_root: true
    description: 'Container für politische Akteure, Gruppen und Beziehungen.

      '
    annotations:
      description_de: 'Container für politische Akteure, Gruppen und Beziehungen.

        '
    mixins:
    - HasIdentification
    slots:
    - persons
    - groups
    - memberships
    - interest_links
  Person:
    description: 'Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.

      '
    annotations:
      description_de: 'Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    slots:
    - label
    - label_long
    - birth_year
    - birth_date
    - death_date
    - picture
    - names
    - addresses
    - language_proficiencies
    - citizenships
    - genders
    - occupations
    - trainings
    - contacts
    - electoral_district
    - interest_links
    slot_usage:
      label:
        description: 'Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen). Bevorzugt: PersonOfficialName (amtlicher Name) kombiniert mit PersonCallFirstName (Rufname).

          '
        annotations:
          description_de: 'Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen). Bevorzugt: PersonOfficialName (amtlicher Name) kombiniert mit PersonCallFirstName (Rufname).

            '
        required: true
      label_long:
        description: 'Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

          '
        annotations:
          description_de: 'Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

            '
  Group:
    description: 'Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).

      '
    annotations:
      description_de: 'Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - group_type
    - label
    - abbreviation
    - description
    - landing_page
    - parent_groups
    - spatial
    - contacts
    - addresses
    - statutes_url
    - party_color
  Membership:
    description: 'Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe, die eine formale Zugehörigkeit darstellt (z.B. Parteimitglied, Kommissionsmitglied, Parlamentarier/in). Im Unterschied zu InterestLink, der externe Interessenbindungen und Interessenkonflikte zu Organisationen ausserhalb des Akteur-Schemas abbildet.

      '
    annotations:
      description_de: 'Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe, die eine formale Zugehörigkeit darstellt (z.B. Parteimitglied, Kommissionsmitglied, Parlamentarier/in). Im Unterschied zu InterestLink, der externe Interessenbindungen und Interessenkonflikte zu Organisationen ausserhalb des Akteur-Schemas abbildet.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - person_reference
    - group_reference
    - role_type
    - authorized_to_vote
    - is_active
    slot_usage:
      is_active:
        description: 'Gibt an, ob die Mitgliedschaft derzeit aktiv ist. Kann `valid_from`/`valid_through` ergänzen oder ersetzen. Wenn nicht gesetzt, wird die Aktivität aus den zeitlichen Gültigkeitsfeldern abgeleitet.

          '
        annotations:
          description_de: 'Gibt an, ob die Mitgliedschaft derzeit aktiv ist. Kann `valid_from`/`valid_through` ergänzen oder ersetzen. Wenn nicht gesetzt, wird die Aktivität aus den zeitlichen Gültigkeitsfeldern abgeleitet.

            '
  InterestLink:
    description: 'Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation ausserhalb des Akteur-Schemas.

      '
    annotations:
      description_de: 'Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation ausserhalb des Akteur-Schemas.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - person_reference
    - interest_type
    - organization_name
    - organization_uid
    - organization_address
    - legal_form
    - is_paid
    - committee
    - function_role
  Name:
    description: 'Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.

      '
    annotations:
      description_de: 'Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - name_type
    - value
  Address:
    description: 'Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.

      '
    annotations:
      description_de: 'Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.

        '
    slots:
    - address_type
    - address_uri
    - street_address
    - postal_code
    - postal_locality
  LanguageProficiency:
    description: 'Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.

      '
    annotations:
      description_de: 'Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.

        '
    slots:
    - language
    - is_correspondence
    - is_native
  Citizenship:
    description: 'Staatsangehörigkeit (wird auch für Nationalität verwendet) einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.

      '
    annotations:
      description_de: 'Staatsangehörigkeit (wird auch für Nationalität verwendet) einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - country
  Gender:
    description: 'Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.

      '
    annotations:
      description_de: 'Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - gender_code
    - label
    - pronouns
  Occupation:
    description: 'Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.

      '
    annotations:
      description_de: 'Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - is_paid
    - occupation_code
    - label
    - organization_uid
    - organization_name
  Training:
    description: 'Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.

      '
    annotations:
      description_de: 'Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - training_type
    - training_code
    - value
  Contact:
    description: 'Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.

      '
    annotations:
      description_de: 'Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.

        '
    slots:
    - contact_type
    - value
  ElectoralDistrict:
    description: 'Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.

      '
    annotations:
      description_de: 'Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - district
  GroupType:
    description: 'Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).

      '
    annotations:
      description_de: 'Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).

        '
    slots:
    - group_type_enum
    - label
  RoleType:
    description: 'Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident/in, Stellvertreter/in). Wenn eine Rolle im vorgeschlagenen RoleEnum-Vokabular nicht enthalten ist, kann der Wert ''other'' verwendet werden; in diesem Fall soll im Slot `role_label` eine beschreibende Bezeichnung angegeben werden. Die Bezeichnung kann auch verwendet werden, wenn eine spezifische Rollenbezeichnung nötig ist, selbst wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll sie angegeben werden.

      '
    annotations:
      description_de: 'Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident/in, Stellvertreter/in). Wenn eine Rolle im vorgeschlagenen RoleEnum-Vokabular nicht enthalten ist, kann der Wert ''other'' verwendet werden; in diesem Fall soll im Slot `role_label` eine beschreibende Bezeichnung angegeben werden. Die Bezeichnung kann auch verwendet werden, wenn eine spezifische Rollenbezeichnung nötig ist, selbst wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll sie angegeben werden.

        '
    slots:
    - role_type_enum
    - label
    slot_usage:
      label:
        description: 'Spezifische Rollenbezeichnung. Dieses Feld kann verwendet werden, wenn eine konkrete Rollenbezeichnung benötigt wird, auch wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll diese Bezeichnung angegeben werden.

          '
        annotations:
          description_de: 'Spezifische Rollenbezeichnung. Dieses Feld kann verwendet werden, wenn eine konkrete Rollenbezeichnung benötigt wird, auch wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll diese Bezeichnung angegeben werden.

            '
slots:
  name_type:
    slot_uri: act:nameType
    description: 'Typ des Namens gemäss eCH-0011 (personNameData).

      '
    annotations:
      description_de: 'Typ des Namens gemäss eCH-0011 (personNameData).

        '
    range: NameTypeEnum
    examples:
    - value: PersonFirstName
    - value: PersonOfficialName
  address_type:
    slot_uri: act:addressType
    description: 'Typ der Adresse.

      '
    annotations:
      description_de: 'Typ der Adresse.

        '
    range: AddressTypeEnum
    examples:
    - value: businessAddress
  address_uri:
    slot_uri: act:addressURI
    description: 'URI der Adresse aus dem eidgenössischen Gebäudeadressverzeichnis. Der Layer ist zugänglich unter https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Beispiel einer gültigen URI: https://geo.ld.admin.ch/location/address/101904050

      '
    annotations:
      description_de: 'URI der Adresse aus dem eidgenössischen Gebäudeadressverzeichnis. Der Layer ist zugänglich unter https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Beispiel einer gültigen URI: https://geo.ld.admin.ch/location/address/101904050

        '
    range: uriorcurie
  street_address:
    slot_uri: act:streetAddress
    description: 'Strassenadresse.

      '
    annotations:
      description_de: 'Strassenadresse.

        '
  postal_code:
    slot_uri: act:postalCode
    description: 'Postleitzahl.

      '
    annotations:
      description_de: 'Postleitzahl.

        '
    range: integer
  postal_locality:
    slot_uri: act:postalLocality
    description: 'Ort.

      '
    annotations:
      description_de: 'Ort.

        '
    examples:
    - value: Basel-Stadt
  is_correspondence:
    slot_uri: act:isCorrespondence
    description: 'Gibt an, ob es sich um die bevorzugte Sprache handelt.

      '
    annotations:
      description_de: 'Gibt an, ob es sich um die bevorzugte Sprache handelt.

        '
    range: boolean
  is_native:
    slot_uri: act:isNative
    description: 'Gibt an, ob es sich um die Muttersprache handelt.

      '
    annotations:
      description_de: 'Gibt an, ob es sich um die Muttersprache handelt.

        '
    range: boolean
  country:
    slot_uri: act:country
    description: 'ISO 3166-1 alpha-2 Ländercode.

      '
    annotations:
      description_de: 'ISO 3166-1 alpha-2 Ländercode.

        '
    pattern: ^[A-Z]{2}$
    examples:
    - value: CH
  gender_code:
    slot_uri: act:genderCode
    description: 'Geschlechtscode. Empfohlene Werte: male, female, diverse .

      '
    annotations:
      description_de: 'Geschlechtscode. Empfohlene Werte: male, female, diverse .

        '
    range: GenderCodeEnum
    examples:
    - value: male
  pronouns:
    slot_uri: act:pronouns
    description: 'Von der Person verwendete Pronomen.

      '
    annotations:
      description_de: 'Von der Person verwendete Pronomen.

        '
    multivalued: true
    inlined_as_list: true
  is_paid:
    slot_uri: act:isPaid
    description: 'Gibt an, ob die Position bezahlt ist.

      '
    annotations:
      description_de: 'Gibt an, ob die Position bezahlt ist.

        '
    range: boolean
    examples:
    - value: 'False'
    - value: 'True'
  occupation_code:
    slot_uri: act:occupationCode
    description: 'ISCO-19 Code der Tätigkeit.

      '
    annotations:
      description_de: 'ISCO-19 Code der Tätigkeit.

        '
  training_type:
    slot_uri: act:trainingType
    description: 'Typ der Ausbildung oder Bildung.

      '
    annotations:
      description_de: 'Typ der Ausbildung oder Bildung.

        '
    range: TrainingTypeEnum
    examples:
    - value: '3223'
  training_code:
    slot_uri: act:trainingCode
    description: 'ISCO-19 Code der Ausbildung oder Bildung.

      '
    annotations:
      description_de: 'ISCO-19 Code der Ausbildung oder Bildung.

        '
  contact_type:
    slot_uri: act:contactType
    description: 'Typ der Kontaktinformation.

      '
    annotations:
      description_de: 'Typ der Kontaktinformation.

        '
    range: ContactTypeEnum
    examples:
    - value: contact_website
    - value: email
  district:
    slot_uri: act:district
    description: 'Wahlkreis oder Wahlregion.

      '
    annotations:
      description_de: 'Wahlkreis oder Wahlregion.

        '
    examples:
    - value: Basel-Stadt
  birth_year:
    slot_uri: act:birthYear
    description: 'Geburtsjahr. Nur zu verwenden, wenn kein vollständiges `birthDate` vorhanden ist.

      '
    annotations:
      description_de: 'Geburtsjahr. Nur zu verwenden, wenn kein vollständiges `birthDate` vorhanden ist.

        '
    range: integer
    examples:
    - value: '1964'
  birth_date:
    slot_uri: schema:birthDate
    description: 'Genaues Geburtsdatum, sofern verfügbar und öffentlich. Dieses Feld hat Vorrang vor dem Feld `birthYear`.

      '
    annotations:
      description_de: 'Genaues Geburtsdatum, sofern verfügbar und öffentlich. Dieses Feld hat Vorrang vor dem Feld `birthYear`.

        '
    range: date
    examples:
    - value: '1964-07-12'
  death_date:
    slot_uri: schema:deathDate
    description: 'Genaues Todesdatum.

      '
    annotations:
      description_de: 'Genaues Todesdatum.

        '
    range: date
  picture:
    range: uri
    description: 'Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).

      '
    annotations:
      description_de: 'Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).

        '
  group_type:
    range: GroupType
    slot_uri: act:groupType
    description: 'Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Benennung und Beschreibung der Gruppierung wird über `label` gemacht.

      '
    annotations:
      description_de: 'Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Benennung und Beschreibung der Gruppierung wird über `label` gemacht.

        '
  group_type_enum:
    slot_uri: act:groupTypeEnum
    description: 'Link zum kontrollierten Vokabular für Gruppentypen.

      '
    annotations:
      description_de: 'Link zum kontrollierten Vokabular für Gruppentypen.

        '
    range: GroupTypeEnum
  description:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: 'Kurze Beschreibung der Gruppierung.

      '
    annotations:
      description_de: 'Kurze Beschreibung der Gruppierung.

        '
  landing_page:
    slot_uri: act:landingPage
    range: uri
    description: 'Website mit weiteren Informationen.

      '
    annotations:
      description_de: 'Website mit weiteren Informationen.

        '
  parent_groups:
    slot_uri: act:parentGroup
    description: 'Übergeordnete Gruppe. Zum Beispiel die Mutterpartei zu Kantonalparteien, oder zur Beschreibung der Hierarchie in der Exekutive. Auch zur Verknüpfung von Subkommissionen mit Kommissionen oder Fraktionen mit Parlament und Partei. (parentGroup wird typischerweise im selben group_type verwendet, typenübergreifende Verknüpfungen sind aber erlaubt, z.B. Fraktion → Parlament und Fraktion → Partei.)

      '
    annotations:
      description_de: 'Übergeordnete Gruppe. Zum Beispiel die Mutterpartei zu Kantonalparteien, oder zur Beschreibung der Hierarchie in der Exekutive. Auch zur Verknüpfung von Subkommissionen mit Kommissionen oder Fraktionen mit Parlament und Partei. (parentGroup wird typischerweise im selben group_type verwendet, typenübergreifende Verknüpfungen sind aber erlaubt, z.B. Fraktion → Parlament und Fraktion → Partei.)

        '
    range: uriorcurie
    multivalued: true
    inlined_as_list: true
  spatial:
    description: 'Räumliche Referenz (BFS-Gemeindenummer, BFS-Kantonsnummer oder Land). Formate: Gemeinde: ld.admin.ch/municipality/1234, Kanton: ld.admin.ch/canton/23, Bund: ld.admin.ch/country/CHE.

      '
    annotations:
      description_de: 'Räumliche Referenz (BFS-Gemeindenummer, BFS-Kantonsnummer oder Land). Formate: Gemeinde: ld.admin.ch/municipality/1234, Kanton: ld.admin.ch/canton/23, Bund: ld.admin.ch/country/CHE.

        '
  contacts:
    slot_uri: act:contact
    description: 'Kontaktinformationen (E-Mail, Website, Social Media). Richtlinie: E-Mail ist quasi-obligatorisch und sollte wenn vorhanden immer angegeben werden.

      '
    annotations:
      description_de: 'Kontaktinformationen (E-Mail, Website, Social Media). Richtlinie: E-Mail ist quasi-obligatorisch und sollte wenn vorhanden immer angegeben werden.

        '
    range: Contact
    multivalued: true
    inlined_as_list: true
  addresses:
    slot_uri: act:address
    description: 'Adressen mit Typ (privat, geschäftlich, lokal).

      '
    annotations:
      description_de: 'Adressen mit Typ (privat, geschäftlich, lokal).

        '
    range: Address
    multivalued: true
    inlined_as_list: true
    examples:
      value:
      - address_type: businessAddress
        address_URI: https://ld.admin.ch/address/12345
        street_address: Bundesplatz 3
        postal_code: '3003'
        postal_locality: Bern
      - address_type: privateAddress
        postal_locality: Zürich
  statutes_url:
    slot_uri: act:statutesURL
    description: 'URL zu Parteistatuten (PDF oder Webseite; optional für Parteien).

      '
    annotations:
      description_de: 'URL zu Parteistatuten (PDF oder Webseite; optional für Parteien).

        '
  party_color:
    slot_uri: act:partyColor
    description: 'Parteifarbe als Hexadezimalwert (optional für Parteien, z.B. "#FF0000").

      '
    annotations:
      description_de: 'Parteifarbe als Hexadezimalwert (optional für Parteien, z.B. "#FF0000").

        '
  person_reference:
    slot_uri: act:personReference
    description: 'Referenz auf eine Person mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.

      '
    annotations:
      description_de: 'Referenz auf eine Person mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.

        '
    range: PersonReference
    inlined: true
  group_reference:
    slot_uri: act:groupReference
    description: 'Referenz auf eine Gruppe mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.

      '
    annotations:
      description_de: 'Referenz auf eine Gruppe mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.

        '
    range: GroupReference
    inlined: true
  role_type:
    slot_uri: act:roleType
    description: 'Rolle der Person in der Mitgliedschaft oder Funktion.

      '
    annotations:
      description_de: 'Rolle der Person in der Mitgliedschaft oder Funktion.

        '
    range: RoleType
  role_type_enum:
    slot_uri: act:roleTypeEnum
    range: RoleEnum
    description: 'Rolle der Person in der Mitgliedschaft oder Funktion.

      '
    annotations:
      description_de: 'Rolle der Person in der Mitgliedschaft oder Funktion.

        '
  authorized_to_vote:
    range: boolean
    slot_uri: act:authorizedToVote
    description: 'Gibt an, ob die Person in der Gruppe stimmberechtigt ist. Typischerweise false für Ersatzmitglieder (wenn nicht im Einsatz), Beobachter/innen, Sekretär/innen und Gäste.

      '
    annotations:
      description_de: 'Gibt an, ob die Person in der Gruppe stimmberechtigt ist. Typischerweise false für Ersatzmitglieder (wenn nicht im Einsatz), Beobachter/innen, Sekretär/innen und Gäste.

        '
  interest_type:
    range: InterestTypeEnum
    slot_uri: act:interestType
    required: true
    description: 'Art der Interessenbindung (Berufliche Tätigkeit, Politische Ämter, Verein).

      '
    annotations:
      description_de: 'Art der Interessenbindung (Berufliche Tätigkeit, Politische Ämter, Verein).

        '
    examples:
    - value: association
    - value: professional_activity
  organization_name:
    slot_uri: act:organizationName
    description: 'Name der Organisation oder des Unternehmens.

      '
    annotations:
      description_de: 'Name der Organisation oder des Unternehmens.

        '
  organization_uid:
