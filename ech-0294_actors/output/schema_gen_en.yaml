enums:
  NameTypeEnum:
    description: 'Categories of name types according to eCH-0011 (personNameData) and https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI according to I14Y identifier but as class and not as attribute. Descriptions and translations according to I14Y.

      '
    annotations:
      description_de: 'Kategorien von Namenstypen gemäss eCH-0011 (personNameData) und https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI gemäss I14Y Identifier aber als Klasse und nicht als Attribut. Beschreibungen und Übersetzungen gemäss I14Y.

        '
      description_fr: 'Catégories de types de noms selon eCH-0011 (personNameData) et https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI selon l''identifiant I14Y mais en tant que classe et non en tant qu''attribut. Descriptions et traductions selon I14Y.

        '
    permissible_values:
      PersonOfficialName:
        description: 'According to the official catalogue of characters (No. 211) for the harmonisation of registers: Name according to official documents. The official name corresponds to the name appearing in the Swiss civil register. For foreign nationals with no civil status events in Switzerland, the official name corresponds to the name appearing on the foreign passport or identity card (see ‘Name according to foreign passport’ or SEM guidelines on the determination and spelling of names of foreign nationals dated 1 January 2012. If no official documents exist, see also ‘Name according to declaration’ (e.g. in the case of asylum seekers). The official name may consist of one or more parts.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 211) Registerharmonisierung: Name gemäss amtlichen Unterlagen. Der amtliche Name entspricht dem Namen im schweizerischen Zivilstandsregister. Bei ausländischen Personen ohne Zivilstandsereignis in der Schweiz entspricht dieser Name dem Namen im ausländischen Pass oder auf der Identitätskarte (siehe 214 sowie Weisung des SEM über die Bestimmung und Schreibweise der Namen von ausländischen Staatsangehörigen vom 1. Januar 2012. Im Ausnahmefall siehe auch "Name nach Deklaration" (z. B. Asyl), wenn keine amtlichen Dokumente vorliegen). Der amtliche Name kann aus einem oder mehreren Teilen bestehen.

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 211) pour l''harmonisation des registres : nom selon les documents officiels. Le nom officiel correspond au nom figurant dans le registre suisse de l''état civil. Pour les ressortissants étrangers n''ayant pas d''événement d''état civil en Suisse, le nom officiel correspond au nom figurant sur le passeport étranger ou la carte d''identité (voir « Nom selon le passeport étranger » ou les directives du SEM sur la détermination et l''orthographe des noms des ressortissants étrangers du 1er janvier 2012. En l''absence de documents officiels, voir également « Nom selon la déclaration » (p. ex. dans le cas de requérants d''asile). Le nom officiel peut se composer d''une ou de plusieurs parties.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personOfficialName
      PersonOriginalName:
        description: 'According to the official catalogue of characters (No. 212) for the harmonisation of registers: Name of filiation according to official documents, which corresponds to the person''s name before their first marriage or registered partnership. It may also be a maiden name acquired by decision to change one''s name (see Art. 24, para. 2 OEC, RS 211.112.2).

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 212) Registerharmonisierung: Angestammter Name gemäss amtlichen Unterlagen, den eine Person unmittelbar vor ihrer ersten Eheschliessung oder Begründung einer eingetragenen Partnerschaft geführt hat oder, gestützt auf einen Namensänderungsentscheid, als neuen Ledignamen erworben hat (Art. 24 Abs. 2 ZStV, SR 211.112.2).

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 212) pour l''harmonisation des registres : nom de filiation selon les documents officiels, qui correspond au nom porté par la personne avant son premier mariage ou son premier partenariat enregistré. Il peut également s''agir d''un nom de célibataire acquis par une décision de changement de nom (voir art. 24, al. 2 OEC, RS 211.112.2).

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personOriginalName
      PersonAllianceName:
        description: 'According to the official catalogue of characters (No. 213) for the harmonisation of registers: The alliance name shows the connection between two people who are married or living in a registered partnership. An alliance name that has already been used may be retained after the dissolution of the marriage or partnership if the official name has not been changed upon dissolution. It is attached to the official name with a hyphen and is formed with the partner''s maiden name or the person''s own maiden name. Upon request, the alliance name may be entered in the passport or on the identity card.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 213) Registerharmonisierung: Der Allianzname zeigt die Verbindung von zwei Personen auf, die verheiratet sind oder in einer eingetragenen Partnerschaft leben. Ein bereits verwendeter Allianzname kann nach Auflösung der Ehe oder der Partnerschaft weiterverwendet werden, wenn der amtliche Name bei der Auflösung nicht geändert wurde. Dabei wird dem amtlichen Namen mittels Bindestrich der Ledigname des Partners/der Partnerin oder der eigene Ledigname angehängt. Der Allianzname kann auf Antrag im Pass oder auf der Identitätskarte eingetragen werden.

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 213) pour l''harmonisation des registres : le nom d''alliance montre le lien entre deux personnes mariées ou vivant en partenariat enregistré. Un nom d''alliance déjà utilisé peut être conservé après la dissolution du mariage ou du partenariat si le nom officiel n''a pas été modifié lors de la dissolution. Il est rattaché au nom officiel par un trait d''union et est formé avec le nom de célibataire du partenaire ou son propre nom de célibataire. Sur demande, le nom d''alliance peut être inscrit dans le passeport ou sur la carte d''identité.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personAllianceName
      PersonNameOnForeignPassport:
        description: 'According to the official catalogue of characters (No. 214) for the harmonisation of registers: For persons of foreign nationality. This name corresponds to the entry marked in the machine-readable zone of the passport. If this zone includes abbreviated surnames or first names, these must, as far as possible, be recorded in full, according to the entry in the passport.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 214) Registerharmonisierung: Für Personen mit ausländischer Nationalität. Dieser Name entspricht dem Eintrag im Reisepass gemäss der maschinenlesbaren Zone (MRZ) des Reisepasses. Enthält die MRZ abgekürzte Namen oder Vornamen, sind diese möglichst in voller Länge gemäss visuell lesbarer Zone des Ausweispapieres zu erfassen.

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 214) pour l''harmonisation des registres : pour les personnes de nationalité étrangère. Ce nom correspond à l''entrée figurant dans la zone lisible par machine du passeport. Si cette zone comporte des noms de famille ou des prénoms abrégés, ceux-ci doivent, dans la mesure du possible, être enregistrés dans leur intégralité, conformément à l''entrée figurant dans le passeport.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personNameOnForeignPassport
      PersonAliasName:
        description: 'According to the official character catalogue (No. 215) for the harmonisation of registers: Name (e.g. stage name, religious name) which, on the basis of an accepted application, may be used by the person. The alias name may consist of one or more parts (e.g. also the alias first name and alias surname).

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 215) Registerharmonisierung: Name (z. B. Künstler- oder Ordensname), der aufgrund eines bewilligten Gesuchs geführt werden darf. Der Aliasname kann aus einem oder mehreren Teilen (z. B. auch aus Aliasvorname und Aliasname) bestehen.

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 215) pour l''harmonisation des registres : nom (p. ex. nom de scène, nom religieux) qui, sur la base d''une demande acceptée, peut être porté par la personne. Le nom d''alias peut se composer d''une ou de plusieurs parties (p. ex. également le prénom d''alias et le nom de famille d''alias).

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personAliasName
      PersonOtherName:
        description: 'According to the official catalogue of characters (No. 216) for the harmonisation of registers: Other official names according to Swiss civil status documents (Art. 24, para. 3 OEC) or according to foreign documents, which are neither surnames nor first names.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 216) Registerharmonisierung: Weitere amtliche Namen gemäss schweizerischen Zivilstandsdokumenten (Art. 24 Abs. 3 ZStV) oder ausländischen Dokumenten, welche weder Familiennamen noch Vornamen sind.

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 216) pour l''harmonisation des registres : autres noms officiels selon les documents d''état civil suisses (art. 24, al. 3 OEC) ou selon des documents étrangers, qui ne sont ni des noms de famille ni des prénoms.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personOtherName
      PersonDeclaredForeignerName:
        description: 'According to the official catalogue of characters (No. 217) for the harmonisation of registers: For foreign nationals who do not have official documents (mainly in the field of asylum).

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 217) Registerharmonisierung: Für Personen mit ausländischer Nationalität, die keine offiziellen Dokumente besitzen (hauptsächlich im Asylbereich).

            '
          description_fr: 'Selon le catalogue officiel des caractères (n° 217) pour l''harmonisation des registres : pour les ressortissants étrangers qui ne disposent pas de documents officiels (principalement dans le domaine de l''asile).

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personDeclaredForeignerName
      PersonFirstName:
        description: 'First names taken from the birth certificate, the civil registry (Infostar) in the order in which they appear, or taken from foreign identity documents.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 221) Registerharmonisierung: Vornamen gemäss Geburtsurkunde oder Zivilstandsregister/Infostar in der aufgeführten Reihenfolge bzw. gemäss ausländischen Ausweispapieren.

            '
          description_fr: 'Prénoms tirés de l''acte de naissance, du registre de l''état civil (Infostar) dans l''ordre dans lequel ils apparaissent, ou tirés de documents d''identité étrangers.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personFirstName
      PersonCallFirstName:
        description: 'A person has the right to choose a common first name from the list of their official first names. The common first name may consist of one or more first names (from those listed under ‘official first names’).

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 222) Registerharmonisierung: Eine Person hat das Recht, aus der Liste ihrer amtlichen Vornamen einen Rufnamen auszuwählen. Der Rufname kann aus einem oder mehreren Vornamen (aus den "amtlichen Vornamen") bestehen.

            '
          description_fr: 'Une personne a le droit de choisir un prénom usuel dans la liste de ses prénoms officiels. Le prénom usuel peut se composer d''un ou de plusieurs prénoms (parmi ceux figurant sous « prénoms officiels »).

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personCallFirstName
      PersonFirstNameOnForeignPassport:
        description: 'For persons of foreign nationality. To be used in combination with the name as it appears on the foreign passport.

          '
        annotations:
          description_de: 'Gemäss amtlichen Katalog der Merkmale (Nr. 223) Registerharmonisierung: Für Personen mit ausländischer Nationalität. Zu benutzen in Verbindung mit dem Namen im ausländischen Pass."

            '
          description_fr: 'Pour les personnes de nationalité étrangère. À utiliser en combinaison avec le nom tel qu''il figure sur le passeport étranger.

            '
        meaning: https://register.ld.admin.ch/i14y/concept/personFirstNameOnForeignPassport
      PersonDeclaredForeignerFirstName:
        description: 'For persons of foreign nationality who do not have official documents (mainly in the field of asylum). To be used in combination with the defined Name according to declaration.

          '
        annotations:
