id: https://ld.ech.ch/schema/0294/actors
name: actors-schema
title: Actors Schema
description: 'A schema describing political actors including persons, groups, memberships, and interest links.

  '
annotations:
  description_de: 'Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.

    '
  description_fr: 'Un schéma décrivant les acteurs politiques, y compris les personnes, les groupes, les affiliations et les liens d''intérêts.

    '
license: CC-BY
prefixes:
  linkml: https://w3id.org/linkml/
  act: https://ld.ech.ch/schema/0294/actors/
  dcterms: http://purl.org/dc/terms/
default_prefix: act
default_range: string
imports:
- linkml:types
- ../../ech-0292_meta/input/schema_common
classes:
  Container:
    tree_root: true
    description: 'Container for political actors, groups, and relationships.

      '
    annotations:
      description_de: 'Container für politische Akteure, Gruppen und Beziehungen.

        '
      description_fr: 'Conteneur pour les acteurs politiques, les groupes et les relations.

        '
    mixins:
    - HasIdentification
    slots:
    - persons
    - groups
    - memberships
    - interest_links
  Person:
    description: 'A person with identifiers, names, addresses, citizenships, and occupations.

      '
    annotations:
      description_de: 'Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.

        '
      description_fr: 'Une personne avec des identifiants, des noms, des adresses, des nationalités et des professions.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    slots:
    - label
    - label_long
    - birth_year
    - birth_date
    - death_date
    - picture
    - names
    - addresses
    - language_proficiencies
    - citizenships
    - genders
    - occupations
    - trainings
    - contacts
    - electoral_district
    - interest_links
    slot_usage:
      label:
        description: 'Mandatory short display name to identify the person within the organisation (e.g. with added birth year to distinguish persons with the same name). Preferred: PersonOfficialName combined with PersonCallFirstName.

          '
        annotations:
          description_de: 'Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen). Bevorzugt: PersonOfficialName (amtlicher Name) kombiniert mit PersonCallFirstName (Rufname).

            '
          description_fr: 'Nom d''affichage court et obligatoire permettant d''identifier la personne au sein de l''organisation (p. ex. avec l''ajout de l''année de naissance afin de distinguer des personnes portant le même nom). Recommandé : PersonOfficialName combiné avec PersonCallFirstName.

            '
        required: true
      label_long:
        description: 'Optional long display name including academic titles and full official name (e.g. "Dr. Maria Muster-Beispiel").

          '
        annotations:
          description_de: 'Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

            '
          description_fr: 'Nom d''affichage long et facultatif comprenant les titres académiques et le nom officiel complet (p. ex. « Dr. Maria Muster-Beispiel »).

            '
  Group:
    description: 'A political group, organization, or body (e.g., party, committee, parliament, department).

      '
    annotations:
      description_de: 'Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).

        '
      description_fr: 'Un groupe, une organisation ou une collectivité politique (p. ex. parti, commission, parlement, département).

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - group_type
    - label
    - abbreviation
    - description
    - landing_page
    - parent_groups
    - spatial
    - contacts
    - addresses
    - statutes_url
    - party_color
  Membership:
    description: 'A membership relationship between a person and a group, representing formal affiliation (e.g., party member, commission member, parliamentarian). Distinct from InterestLink, which covers external interest bindings and conflicts of interest to organizations outside the actor schema.

      '
    annotations:
      description_de: 'Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe, die eine formale Zugehörigkeit darstellt (z.B. Parteimitglied, Kommissionsmitglied, Parlamentarier/in). Im Unterschied zu InterestLink, der externe Interessenbindungen und Interessenkonflikte zu Organisationen ausserhalb des Akteur-Schemas abbildet.

        '
      description_fr: 'Une relation d''affiliation entre une personne et un groupe, représentant une appartenance formelle (p. ex. membre d''un parti, membre d''une commission, parlementaire). À distinguer de InterestLink, qui recouvre les liens d''intérêts externes et les conflits d''intérêts avec des organisations situées en dehors du schéma des acteurs.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - person_reference
    - group_reference
    - role_type
    - authorized_to_vote
    - is_active
    slot_usage:
      is_active:
        description: 'Indicates if the membership is currently active. Can complement or replace `valid_from`/`valid_through`. If not set, activity is derived from the temporal validity fields.

          '
        annotations:
          description_de: 'Gibt an, ob die Mitgliedschaft derzeit aktiv ist. Kann `valid_from`/`valid_through` ergänzen oder ersetzen. Wenn nicht gesetzt, wird die Aktivität aus den zeitlichen Gültigkeitsfeldern abgeleitet.

            '
          description_fr: 'Indique si l''affiliation est actuellement active. Peut compléter ou remplacer `valid_from`/`valid_through`. Si cette valeur n''est pas renseignée, l''activité est déduite des champs de validité temporelle.

            '
  InterestLink:
    description: 'An interest link (conflict of interest, political financing) of a person to an organization outside the actor schema.

      '
    annotations:
      description_de: 'Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation ausserhalb des Akteur-Schemas.

        '
      description_fr: 'Un lien d''intérêts (conflit d''intérêts, financement politique) d''une personne avec une organisation située en dehors du schéma des acteurs.

        '
    mixins:
    - HasIdentification
    - HasCreationModificationDates
    - HasTemporalValidity
    slots:
    - person_reference
    - interest_type
    - organization_name
    - organization_uid
    - organization_address
    - legal_form
    - is_paid
    - committee
    - function_role
  Name:
    description: 'A name with a type (e.g., call name, official name), a value, and a temporal validity.

      '
    annotations:
      description_de: 'Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.

        '
      description_fr: 'Un nom avec un type (p. ex. nom d''usage, nom officiel), une valeur et une validité temporelle.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - name_type
    - value
  Address:
    description: 'An address with a type (e.g., private address, business address) and a value.

      '
    annotations:
      description_de: 'Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.

        '
      description_fr: 'Une adresse avec un type (p. ex. adresse privée, adresse professionnelle) et une valeur.

        '
    slots:
    - address_type
    - address_uri
    - street_address
    - postal_code
    - postal_locality
  LanguageProficiency:
    description: 'Language proficiency of a person indicating the language and whether it is the preferred language or native language.

      '
    annotations:
      description_de: 'Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.

        '
      description_fr: 'Compétences linguistiques d''une personne indiquant la langue et le fait qu''il s''agisse ou non de la langue préférée ou de la langue maternelle.

        '
    slots:
    - language
    - is_correspondence
    - is_native
  Citizenship:
    description: 'Citizenship (also used for Nationality) of a person indicating the country and temporal validity. If there is no `valid_from` provided, the information is not known. If it is known that the citizenship is valid from birth, the birthdate is to be repeated here. If there is no `valid_through`, the citizenship is still active.

      '
    annotations:
      description_de: 'Staatsangehörigkeit (wird auch für Nationalität verwendet) einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.

        '
      description_fr: 'Nationalité (également utilisée pour la citoyenneté) d''une personne indiquant le pays et la validité temporelle. Si aucun `valid_from` n''est fourni, cette information n''est pas connue. S''il est établi que la nationalité est valable depuis la naissance, la date de naissance doit être répétée ici. En l''absence de `valid_through`, la nationalité est toujours en vigueur.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - country
  Gender:
    description: 'Gender of a person indicating a gender code and temporal validity.

      '
    annotations:
      description_de: 'Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.

        '
      description_fr: 'Sexe d''une personne indiquant un code de sexe et la validité temporelle.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - gender_code
    - label
    - pronouns
  Occupation:
    description: 'Occupation or profession of a person indicating a label, an ISCO-19 code, whether the position is paid, and temporal validity.

      '
    annotations:
      description_de: 'Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.

        '
      description_fr: 'Métier ou profession d''une personne indiquant un libellé, un code ISCO-19, si le poste est rémunéré, ainsi que la validité temporelle.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - is_paid
    - occupation_code
    - label
    - organization_uid
    - organization_name
  Training:
    description: 'Training or education of a person indicating a type (e.g., school diploma, university degree, military service), a label, an ISCO-19 code, and temporal validity.

      '
    annotations:
      description_de: 'Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.

        '
      description_fr: 'Formation ou éducation d''une personne indiquant un type (p. ex. diplôme scolaire, diplôme universitaire, service militaire), un libellé, un code ISCO-19 et la validité temporelle.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - training_type
    - training_code
    - value
  Contact:
    description: 'Contact information of a person indicating a type (e.g., email, LinkedIn) and a value.

      '
    annotations:
      description_de: 'Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.

        '
      description_fr: 'Informations de contact d''une personne indiquant un type (p. ex. e-mail, LinkedIn) et une valeur.

        '
    slots:
    - contact_type
    - value
  ElectoralDistrict:
    description: 'Electoral district or region where a person is politically active; with temporal validity.

      '
    annotations:
      description_de: 'Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.

        '
      description_fr: 'Circonscription ou région électorale dans laquelle une personne est politiquement active ; avec validité temporelle.

        '
    mixins:
    - HasTemporalValidity
    slots:
    - district
  GroupType:
    description: 'Type of group (e.g., party, committee, parliament, department).

      '
    annotations:
      description_de: 'Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).

        '
      description_fr: 'Type de groupe (p. ex. parti, commission, parlement, département).

        '
    slots:
    - group_type_enum
    - label
  RoleType:
    description: 'Role of a person in a membership or function (e.g., member, president, deputy). If a role is not listed in the proposed RoleEnum vocabulary, the value ''other'' can be used, and a descriptive label should be provided in the `role_label` slot. The label can also be used when a specific name is needed, even if a fitting semantic value exists in `role_type_enum`; it should be provided when `role_type_enum` is set to ''other''.

      '
    annotations:
      description_de: 'Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident/in, Stellvertreter/in). Wenn eine Rolle im vorgeschlagenen RoleEnum-Vokabular nicht enthalten ist, kann der Wert ''other'' verwendet werden; in diesem Fall soll im Slot `role_label` eine beschreibende Bezeichnung angegeben werden. Die Bezeichnung kann auch verwendet werden, wenn eine spezifische Rollenbezeichnung nötig ist, selbst wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll sie angegeben werden.

        '
      description_fr: 'Rôle d''une personne dans une affiliation ou une fonction (p. ex. membre, président, suppléant). Si un rôle ne figure pas dans le vocabulaire RoleEnum proposé, la valeur « other » peut être utilisée, et un libellé descriptif doit être fourni dans le slot `role_label`. Le libellé peut également être utilisé lorsqu''une désignation spécifique est nécessaire, même s''il existe une valeur sémantique appropriée dans `role_type_enum` ; il doit être fourni lorsque `role_type_enum` est réglé sur « other ».

        '
    slots:
    - role_type_enum
    - label
    slot_usage:
      label:
        description: 'Specific role label. Use this when a specific role name is needed, even if a fitting semantic value exists in `role_type_enum`; provide this label when `role_type_enum` is set to ''other''.

          '
        annotations:
          description_de: 'Spezifische Rollenbezeichnung. Dieses Feld kann verwendet werden, wenn eine konkrete Rollenbezeichnung benötigt wird, auch wenn in `role_type_enum` bereits ein passender semantischer Wert vorhanden ist; bei `role_type_enum = other` soll diese Bezeichnung angegeben werden.

            '
          description_fr: 'Libellé de rôle spécifique. À utiliser lorsqu''un nom de rôle spécifique est nécessaire, même s''il existe une valeur sémantique appropriée dans `role_type_enum` ; fournir ce libellé lorsque `role_type_enum` est réglé sur « other ».

            '
slots:
  name_type:
    slot_uri: act:nameType
    description: 'Type of name according to eCH-0011 (personNameData).

      '
    annotations:
      description_de: 'Typ des Namens gemäss eCH-0011 (personNameData).

        '
      description_fr: 'Type de nom selon eCH-0011 (personNameData).

        '
    range: NameTypeEnum
    examples:
    - value: PersonFirstName
    - value: PersonOfficialName
  address_type:
    slot_uri: act:addressType
    description: 'Type of address.

      '
    annotations:
      description_de: 'Typ der Adresse.

        '
      description_fr: 'Type d''adresse.

        '
    range: AddressTypeEnum
    examples:
    - value: businessAddress
  address_uri:
    slot_uri: act:addressURI
    description: 'URI of the address from the Swiss federal building address register. The layer can be accessed at https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Example of a valid URI: https://geo.ld.admin.ch/location/address/101904050

      '
    annotations:
      description_de: 'URI der Adresse aus dem eidgenössischen Gebäudeadressverzeichnis. Der Layer ist zugänglich unter https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Beispiel einer gültigen URI: https://geo.ld.admin.ch/location/address/101904050

        '
      description_fr: 'URI de l''adresse issue du répertoire fédéral des adresses de bâtiments. La couche est accessible à l''adresse https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Exemple d''URI valide : https://geo.ld.admin.ch/location/address/101904050

        '
    range: uriorcurie
  street_address:
    slot_uri: act:streetAddress
    description: 'Street address.

      '
    annotations:
      description_de: 'Strassenadresse.

        '
      description_fr: 'Adresse (rue).

        '
  postal_code:
    slot_uri: act:postalCode
    description: 'Postal code.

      '
    annotations:
      description_de: 'Postleitzahl.

        '
      description_fr: 'Code postal.

        '
    range: integer
  postal_locality:
    slot_uri: act:postalLocality
    description: 'Locality.

      '
    annotations:
      description_de: 'Ort.

        '
      description_fr: 'Localité.

        '
    examples:
    - value: Basel-Stadt
  is_correspondence:
    slot_uri: act:isCorrespondence
    description: 'Indicates if this is the preferred language.

      '
    annotations:
      description_de: 'Gibt an, ob es sich um die bevorzugte Sprache handelt.

        '
      description_fr: 'Indique s''il s''agit de la langue préférée.

        '
    range: boolean
  is_native:
    slot_uri: act:isNative
    description: 'Indicates if this is the native language.

      '
    annotations:
      description_de: 'Gibt an, ob es sich um die Muttersprache handelt.

        '
      description_fr: 'Indique s''il s''agit de la langue maternelle.

        '
    range: boolean
  country:
    slot_uri: act:country
    description: 'ISO 3166-1 alpha-2 country code.

      '
    annotations:
      description_de: 'ISO 3166-1 alpha-2 Ländercode.

        '
      description_fr: 'Code de pays ISO 3166-1 alpha-2.

        '
    pattern: ^[A-Z]{2}$
    examples:
    - value: CH
  gender_code:
    slot_uri: act:genderCode
    description: 'Gender code. Recommended values: male, female, diverse.

      '
    annotations:
      description_de: 'Geschlechtscode. Empfohlene Werte: male, female, diverse .

        '
      description_fr: 'Code de sexe. Valeurs recommandées : male, female, diverse.

        '
    range: GenderCodeEnum
    examples:
    - value: male
  pronouns:
    slot_uri: act:pronouns
    description: 'Pronouns used by the person.

      '
    annotations:
      description_de: 'Von der Person verwendete Pronomen.

        '
      description_fr: 'Pronoms utilisés par la personne.

        '
    multivalued: true
    inlined_as_list: true
  is_paid:
    slot_uri: act:isPaid
    description: 'Indicates if the position is paid.

      '
    annotations:
      description_de: 'Gibt an, ob die Position bezahlt ist.

        '
      description_fr: 'Indique si le poste est rémunéré.

        '
    range: boolean
    examples:
    - value: 'False'
    - value: 'True'
  occupation_code:
    slot_uri: act:occupationCode
    description: 'ISCO-19 code of the occupation.

      '
    annotations:
      description_de: 'ISCO-19 Code der Tätigkeit.

        '
      description_fr: 'Code ISCO-19 du métier.

        '
  training_type:
    slot_uri: act:trainingType
    description: 'Type of training or education.

      '
    annotations:
      description_de: 'Typ der Ausbildung oder Bildung.

        '
      description_fr: 'Type de formation ou d''éducation.

        '
    range: TrainingTypeEnum
    examples:
    - value: '3223'
  training_code:
    slot_uri: act:trainingCode
    description: 'ISCO-19 code of the training or education.

      '
    annotations:
      description_de: 'ISCO-19 Code der Ausbildung oder Bildung.

        '
      description_fr: 'Code ISCO-19 de la formation ou de l''éducation.

        '
  contact_type:
    slot_uri: act:contactType
    description: 'Type of contact information.

      '
    annotations:
      description_de: 'Typ der Kontaktinformation.

        '
      description_fr: 'Type d''informations de contact.

        '
    range: ContactTypeEnum
    examples:
    - value: contact_website
    - value: email
  district:
    slot_uri: act:district
    description: 'Electoral district or region.

      '
    annotations:
      description_de: 'Wahlkreis oder Wahlregion.

        '
      description_fr: 'Circonscription ou région électorale.

        '
    examples:
    - value: Basel-Stadt
  birth_year:
    slot_uri: act:birthYear
    description: 'Year of birth. Only to be used, if there is no full `birthDate` available.

      '
    annotations:
      description_de: 'Geburtsjahr. Nur zu verwenden, wenn kein vollständiges `birthDate` vorhanden ist.

        '
      description_fr: 'Année de naissance. À utiliser uniquement lorsqu''aucune `birthDate` complète n''est disponible.

        '
    range: integer
    examples:
    - value: '1964'
  birth_date:
    slot_uri: schema:birthDate
    description: 'Exact date of birth if available and public. This field has precedence over the field `birthYear`.

      '
    annotations:
      description_de: 'Genaues Geburtsdatum, sofern verfügbar und öffentlich. Dieses Feld hat Vorrang vor dem Feld `birthYear`.

        '
      description_fr: 'Date de naissance exacte si disponible et publique. Ce champ prime sur le champ `birthYear`.

        '
    range: date
    examples:
    - value: '1964-07-12'
  death_date:
    slot_uri: schema:deathDate
    description: 'Exact date of death.

      '
    annotations:
      description_de: 'Genaues Todesdatum.

        '
      description_fr: 'Date de décès exacte.

        '
    range: date
  picture:
    range: uri
    description: 'Link to an image (preferred: PNG, then JPG, then GIF).

      '
    annotations:
      description_de: 'Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).

        '
      description_fr: 'Lien vers une image (de préférence : PNG, puis JPG, puis GIF).

        '
  group_type:
    range: GroupType
    slot_uri: act:groupType
    description: 'Type of group (e.g., party, commission, parliament, or similar). The exact naming and description of the group is provided via `label`.

      '
    annotations:
      description_de: 'Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Benennung und Beschreibung der Gruppierung wird über `label` gemacht.

        '
      description_fr: 'Type de groupe (p. ex. parti, commission, parlement ou similaire). La désignation et la description exactes du groupe sont fournies via `label`.

        '
  group_type_enum:
    slot_uri: act:groupTypeEnum
    description: 'Link to the controlled vocabulary for group types.

      '
    annotations:
      description_de: 'Link zum kontrollierten Vokabular für Gruppentypen.

        '
      description_fr: 'Lien vers le vocabulaire contrôlé pour les types de groupes.

        '
    range: GroupTypeEnum
  description:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: 'Description of the entity.

      '
    annotations:
      description_de: 'Kurze Beschreibung der Gruppierung.

        '
      description_fr: 'Description de l''entité.

        '
  landing_page:
    slot_uri: act:landingPage
    range: uri
    description: 'Website providing further information.

      '
    annotations:
      description_de: 'Website mit weiteren Informationen.

        '
      description_fr: 'Site web fournissant de plus amples informations.

        '
  parent_groups:
    slot_uri: act:parentGroup
    description: 'Link to parent groups. For example, the parent party for cantonal parties, or to describe the hierarchy in the executive. Also used to link sub-commissions to commissions, or factions to both their parliament and their party. (parentGroup is typically used within the same group_type, but cross-type links are permitted, e.g., faction → parliament and faction → party.)

      '
    annotations:
      description_de: 'Übergeordnete Gruppe. Zum Beispiel die Mutterpartei zu Kantonalparteien, oder zur Beschreibung der Hierarchie in der Exekutive. Auch zur Verknüpfung von Subkommissionen mit Kommissionen oder Fraktionen mit Parlament und Partei. (parentGroup wird typischerweise im selben group_type verwendet, typenübergreifende Verknüpfungen sind aber erlaubt, z.B. Fraktion → Parlament und Fraktion → Partei.)

        '
      description_fr: 'Lien vers les groupes parents. Par exemple, le parti faîtier pour les partis cantonaux, ou pour décrire la hiérarchie au sein de l''exécutif. Utilisé également pour rattacher des sous-commissions à des commissions, ou des groupes parlementaires à la fois à leur parlement et à leur parti. (parentGroup est généralement utilisé au sein d''un même group_type, mais les liens intertypes sont autorisés, p. ex. groupe parlementaire → parlement et groupe parlementaire → parti.)

        '
    range: uriorcurie
    multivalued: true
    inlined_as_list: true
