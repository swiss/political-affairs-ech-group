# HEADER 
# ----------------------------------------------------------------

id: https://ld.ech.ch/schema/0294/actors
name: actors-schema
title: Actors Schema
description: |
  A schema describing political actors including persons, groups, memberships, and interest links.
annotations:
  description_de: |
    Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.
license: CC-BY
prefixes:
  linkml: https://w3id.org/linkml/
  act: https://ld.ech.ch/schema/0294/actors/
  dcterms: http://purl.org/dc/terms/
default_prefix: act
default_range: string
imports:
  - linkml:types
  - ../../ech-0292_meta/input/schema_common

# CLASSES
# ----------------------------------------------------------------

classes:
  Container:
    tree_root: true
    description: |
      Container for political actors, groups, and relationships.
    annotations:
      description_de: |
        Container für politische Akteure, Gruppen und Beziehungen.
    mixins:
      - HasIdentification
    slots:
      - persons
      - groups
      - memberships
      - interest_links

  Person:
    description: |
      A person with identifiers, names, addresses, citizenships, and occupations.
    annotations:
      description_de: |
        Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
    slots:
      - label # Einfacher Name ohne Titel oder Berufsbezeichnung. 
      - label_long # Name inklusive aller Titel und Berufsbezeichnungen.
      - birth_year
      - birth_date
      - death_date
      - picture
      - names
      - addresses
      - language_proficiencies
      - citizenships
      - genders
      - occupations
      - trainings
      - contacts
      - electoral_district
      - interest_links

  Group:
    description: |
      A political group, organization, or body (e.g., party, committee, parliament, department).
    annotations:
      description_de: |
        Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - group_type
      - label
      - abbreviation
      - description
      - landing_page
      - parent_groups
      - spatial
      - contacts
      - addresses
      - statutes_url
      - party_color

  PersonReference:
    description: |
      Lightweight reference to a person with key identification data at time of linking. Preserves historical accuracy even if the person changes later.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Person mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung. Ermöglicht historische Korrektheit auch wenn sich die Person später ändert.
    mixins:
      - HasIdentification
    slots:
      - label
      - label_long
      - role_type
      - group_label

  GroupReference:
    description: |
      Lightweight reference to a group with key identification data at time of linking.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Gruppe mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung.
    mixins:
      - HasIdentification
    slots:
      - label
      - abbreviation
      - group_type

  Membership:
    description: |
      A membership relationship between a person and a group.
    annotations:
      description_de: |
        Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - person_reference
      - group_reference
      - role_type
      - authorized_to_vote

  InterestLink:
    description: |
      An interest link (conflict of interest, political financing) of a person to an organization.
    annotations:
      description_de: |
        Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - person_reference
      - interest_type
      - organization_label
      - organization_uid
      - organization_address
      - legal_form
      - is_paid
      - committee
      - function_role
  
  Name:
    description: |
      A name with a type (e.g., call name, official name) and a value.
    annotations:
      description_de: |
        Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - name_type
      - value

  Address:
    description: |
      An address with a type (e.g., private address, business address) and a value.
    annotations:
      description_de: |
        Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.
    slots:
      - address_type
      - address_uri
      - street_address
      - postal_code
      - postal_locality

  LanguageProficiency:
    description: |
      Language proficiency of a person indicating the language and whether it is the preferred language or native language.
    annotations:
      description_de: |
        Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.
    slots:
      - language
      - is_correspondence
      - is_native

  Citizenship:
    description: |
      Citizenship (also used for Nationality) of a person indicating the country and temporal validity. If there is no `valid_from` provided, the information is not known. If it is known that the citizenship is valid from birth, the birthdate is to be repeated here. If there is no `valid_through`, the citizenship is still active.
    annotations:
      description_de: |
        Staatsangehörigkeit einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.
    mixins: 
      - HasTemporalValidity
    slots:
      - country

  Gender:
    description: |
      Gender of a person indicating a gender code and temporal validity.
    annotations:
      description_de: |
        Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - gender_code
      - pronouns

  Occupation:
    description: |
      Occupation or profession of a person indicating a label, an ISCO-19 code, whether the position is paid, and temporal validity.
    annotations:
      description_de: |
        Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - is_paid
      - occupation_code
      - label
      - enterprise_uid
      - enterprise

  Training:
    description: |
      Training or education of a person indicating a type (e.g., school diploma, university degree, military service), a label, an ISCO-19 code, and temporal validity.
    annotations:
      description_de: |
        Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - training_type
      - training_code
      - value

  Contact:
    description: |
      Contact information of a person indicating a type (e.g., email, LinkedIn) and a value.
    annotations:
      description_de: |
        Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.
    slots:
      - contact_type
      - value
  
  ElectoralDistrict:
    description: |
      Electoral district or region where a person is politically active; with temporal validity.
    annotations:
      description_de: |
        Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - district

  GroupType:
    description: |
      Type of group (e.g., party, committee, parliament, department).
    annotations:
      description_de: |
        Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).
    slots:
      - group_type_enum
      - label

  RoleType:
    description: |
      Role of a person in a membership or function (e.g., member, president, deputy).
    annotations:
      description_de: |
        Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident, Stellvertreter).
    slots:
      - role_type_enum
      - label

# SLOTS
# ----------------------------------------------------------------

slots:
  name_type:
    slot_uri: act:nameType
    description: |
      Type of name.
    annotations:
      description_de: |
        Typ des Namens.
    range: NameTypeEnum

  address_type:
    slot_uri: act:addressType
    description: |
      Type of address.
    annotations:
      description_de: |
        Typ der Adresse.
    range: AddressTypeEnum

  address_uri:
    slot_uri: act:addressURI
    description: |
      URI of the address.
    annotations:
      description_de: |
        URI der Adresse.
    range: uriorcurie

  street_address:
    slot_uri: act:streetAddress
    description: |
      Street address.
    annotations:
      description_de: |
        Strassenadresse.

  postal_code:
    slot_uri: act:postalCode
    description: |
      Postal code.
    annotations:
      description_de: |
        Postleitzahl.
    range: integer

  postal_locality:
    slot_uri: act:postalLocality
    description: |
      Locality.
    annotations:
      description_de: |
        Ort.

  is_correspondence:
    slot_uri: act:isCorrespondence
    description: |
      Indicates if this is the preferred language.
    annotations:
      description_de: |
        Gibt an, ob es sich um die bevorzugte Sprache handelt.
    range: boolean

  is_native:
    slot_uri: act:isNative
    description: |
      Indicates if this is the native language.
    annotations:
      description_de: |
        Gibt an, ob es sich um die Muttersprache handelt.
    range: boolean

  country:
    slot_uri: act:country
    description: |
      ISO 3166 country code.
    annotations:
      description_de: |
        ISO 3166 Ländercode.
    pattern: ^[A-Z]{2}$

  gender_code:
    slot_uri: act:genderCode
    description: |
      Gender code (e.g., according to ISO 5218).
    annotations:
      description_de: |
        Geschlechtscode (z.B. gemäß ISO 5218).

  pronouns:
    slot_uri: act:pronouns
    description: |
      Pronouns used by the person.
    annotations:
      description_de: |
        Von der Person verwendete Pronomen.
    multivalued: true
    inlined_as_list: true

  is_paid:
    slot_uri: act:isPaid
    description: |
      Indicates if the position is paid.
    annotations:
      description_de: |
        Gibt an, ob die Position bezahlt ist.
    range: boolean

  occupation_code:
    slot_uri: act:occupationCode
    description: |
      ISCO-19 code of the occupation.
    annotations:
      description_de: |
        ISCO-19 Code der Tätigkeit.

  enterprise_uid:
    slot_uri: act:enterpriseUid
    description: |
      UID of the enterprise.
    annotations:
      description_de: |
        UID des Unternehmens.

  enterprise:
    slot_uri: act:enterprise
    description: |
      Name of the enterprise.
    annotations:
      description_de: |
        Name des Unternehmens.

  training_type:
    slot_uri: act:trainingType
    description: |
      Type of training or education.
    annotations:
      description_de: |
        Typ der Ausbildung oder Bildung.
    range: TrainingTypeEnum

  training_code:
    slot_uri: act:trainingCode
    description: |
      ISCO-19 code of the training or education.
    annotations:
      description_de: |
        ISCO-19 Code der Ausbildung oder Bildung.

  contact_type:
    slot_uri: act:contactType
    description: |
      Type of contact information.
    annotations:
      description_de: |
        Typ der Kontaktinformation.
    range: ContactTypeEnum

  district:
    slot_uri: act:district
    description: |
      Electoral district or region.
    annotations:
      description_de: |
        Wahlkreis oder Wahlregion.

  birth_year:
    slot_uri: act:birthYear
    description: |
      Year of birth. Only to be used, if there is no full `birthDate` available.
    annotations:
      description_de: |
        Geburtsjahr.
    range: integer

  birth_date:
    slot_uri: schema:birthDate
    description: |
      Exact date of birth if available and public. This field has precedence over the field `birthYear`.
    annotations:
      description_de: |
        Genaues Geburtsdatum.
    range: date

  death_date:
    slot_uri: schema:deathDate
    description: |
      Exact date of death.
    annotations:
      description_de: |
        Genaues Todesdatum.
    range: date

  picture:
    range: uri
    description: |
      Link to an image (preferred: PNG, then JPG, then GIF).
    annotations:
      description_de: |
        Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).

  group_type:
    range: GroupType
    slot_uri: act:groupType
    description: |
      Link to the group type.
    annotations:
      description_de: |
        Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Bennenung und Beschreibung der Gruppierung wird über `name` gemacht.

  group_type_enum:
    slot_uri: act:groupTypeEnum
    description: |
      Link to the controlled vocabulary for group types.
    annotations:
      description_de: |
        Link zum kontrollierten Vokabular für Gruppentypen.
    range: GroupTypeEnum

  abbreviation:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      Abbreviation (can be multilingual).
    annotations:
      description_de: |
        Abkürzung (kann mehrsprachig sein).

  description:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      Description of the entity.
    annotations:
      description_de: |
        Kurze Beschreibung der Gruppierung.

  landing_page:
    slot_uri: act:landingPage
    range: uri
    description: |
      Website providing further information.
    annotations:
      description_de: |
        Website mit weiteren Informationen.

  parent_groups:
    slot_uri: act:parentGroup
    description: |
      Link to parent groups.
    annotations:
      description_de: |
        Übergeordneten Gruppe. Zum Beispiel die Mutterpartei, zu Kantonalenparteien. Oder zur Beschreibung der Hierarchie in Exekutive. Verknüpfung von Subkommissionen mit Kommissionen. (parentGroup wird immer im selben group_type verwendet.)
    range: uriorcurie
    multivalued: true
    inlined_as_list: true

  spatial:
    description: |
      Spatial reference (fos-municipality number, fos-canton number, e.g., ld.admin.ch/municipality/1234, ld.admin.ch/canton/23).
    annotations:
      description_de: |
        Räumliche Referenz (BFS-Gemeindenummer, BFS-Kantonsnummer, z.B. ld.admin.ch/municipality/1234, ld.admin.ch/canton/23).

  contacts:
    slot_uri: act:contact
    description: |
      Contact information (email, website, social media).
    annotations:
      description_de: |
        Kontaktinformationen (E-Mail, Website, Social Media).
    range: Contact
    multivalued: true
    inlined_as_list: true

  addresses:
    slot_uri: act:address
    description: |
      Addresses with type (private, business, local).
    annotations:
      description_de: |
        Adressen mit Typ (privat, geschäftlich, lokal).
    range: Address
    multivalued: true
    inlined_as_list: true
    examples:
      value:
        - address_type: businessAddress
          address_URI: https://ld.admin.ch/address/12345
          street_address: Bundesplatz 3
          postal_code: "3003"
          postal_locality: Bern
        - address_type: privateAddress
          postal_locality: Zürich

  statutes_url:
    slot_uri: act:statutesURL
    description: |
      URL to party statutes (optional for parties).
    annotations:
      description_de: |
        URL zu Parteistatuten (optional für Parteien).

  party_color:
    slot_uri: act:partyColor
    description: |
      Party color (optional for parties).
    annotations:
      description_de: |
        Parteifarbe (optional für Parteien).

  person_reference:
    slot_uri: act:personReference
    description: |
      Reference to a person with snapshot data at time of linking.
    annotations:
      description_de: |
        Referenz auf eine Person mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.
    range: PersonReference
    inlined: true

  group_reference:
    slot_uri: act:groupReference
    description: |
      Reference to a group with snapshot data at time of linking.
    annotations:
      description_de: |
        Referenz auf eine Gruppe mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.
    range: GroupReference
    inlined: true

  group_label:
    slot_uri: act:groupLabel
    description: |
      Name of the body/group at time of linking.
    annotations:
      description_de: |
        Name des Gremiums zum Zeitpunkt der Verknüpfung.

  role_type:
    slot_uri: act:roleType
    description: |
      Role of the person in the membership or function.
    annotations:
      description_de: |
        Rolle der Person in der Mitgliedschaft oder Funktion.
    range: RoleType

  role_type_enum:
    slot_uri: act:roleTypeEnum
    range: RoleEnum
    description: |
      Role of the person in the membership or function.
    annotations:
      description_de: |
        Rolle der Person in der Mitgliedschaft oder Funktion.

  authorized_to_vote:
    range: boolean
    slot_uri: act:authorizedToVote
    description: |
      Indicates if the person is authorized to vote.
    annotations:
      description_de: |
        Gibt an, ob die Person stimmberechtigt ist.

  interest_type:
    range: InterestTypeEnum
    slot_uri: act:interestType
    required: true
    description: |
      Type of interest link (professional activity, political office, association).
    annotations:
      description_de: |
        Art der Interessenbindung (Berufliche Tätigkeit, Politische Ämter, Verein).

  organization_label:
    slot_uri: act:organizationLabel
    description: |
      Label of the organization.
    annotations:
      description_de: |
        Bezeichnung der Organisation.

  organization_uid:
    slot_uri: act:organizationUid
    description: |
      UID of the organization (for analysis with NOGA codes, etc.).
    annotations:
      description_de: |
        UID der Organisation (für Auswertungen mit NOGA-Codes, etc.).

  organization_address:
    slot_uri: act:organizationAddress
    description: |
      Address of the organization.
    annotations:
      description_de: |
        Adresse der Organisation.

  legal_form:
    slot_uri: act:legalForm
    description: |
      Legal form of the organization.
    annotations:
      description_de: |
        Rechtsform der Organisation.

  committee:
    slot_uri: act:committee
    description: |
      Committee or board (e.g., foundation board, board of directors).
    annotations:
      description_de: |
        Gremium (z.B. Stiftungsrat, Verwaltungsrat).

  function_role:
    slot_uri: act:functionRole
    description: |
      Function or role in the organization.
    annotations:
      description_de: |
        Funktion oder Rolle in der Organisation.

  names:
    slot_uri: act:name
    description: |
      Names of the person with type and value.
    annotations:
      description_de: |
        Namen der Person mit Typ und Wert.
    range: Name
    multivalued: true
    inlined_as_list: true

  language_proficiencies:
    slot_uri: act:languageProficiency
    description: |
      Language proficiencies of the person.
    annotations:
      description_de: |
        Sprachkompetenzen der Person.
    range: LanguageProficiency
    multivalued: true
    inlined_as_list: true

  citizenships:
    slot_uri: act:citizenship
    description: |
      Citizenships of the person.
    annotations:
      description_de: |
        Staatsbürgerschaften der Person.
    range: Citizenship
    multivalued: true
    inlined_as_list: true

  genders:
    slot_uri: act:gender
    description: |
      Gender of the person.
    annotations:
      description_de: |
        Geschlecht der Person.
    range: Gender
    multivalued: true
    inlined_as_list: true

  occupations:
    slot_uri: act:occupation
    description: |
      Occupations or professions of the person.
    annotations:
      description_de: |
        Berufe oder Tätigkeiten der Person.
    range: Occupation
    multivalued: true
    inlined_as_list: true

  trainings:
    slot_uri: act:training
    description: |
      Trainings or educations of the person.
    annotations:
      description_de: |
        Ausbildungen oder Bildungen der Person.
    range: Training
    multivalued: true
    inlined_as_list: true

  electoral_district:
    slot_uri: act:electoralDistrict
    description: |
      Link to the electoral district.
    annotations:
      description_de: |
        Link zum Wahlbezirk.
    range: ElectoralDistrict

  persons:
    slot_uri: act:person
    description: |
      Collection of persons.
    annotations:
      description_de: |
        Sammlung von Personen.
    range: Person
    multivalued: true
    inlined_as_list: true

  groups:
    slot_uri: act:group
    description: |
      Collection of groups.
    annotations:
      description_de: |
        Sammlung von Gruppen.
    range: Group
    multivalued: true
    inlined_as_list: true

  memberships:
    slot_uri: act:membership
    description: |
      Collection of memberships.
    annotations:
      description_de: |
        Sammlung von Mitgliedschaften.
    range: Membership
    multivalued: true
    inlined_as_list: true

  interest_links:
    slot_uri: act:interestLink
    description: |
      Collection of interest links.range: InterestLink
    annotations:
      description_de: |
        Sammlung von Interessenbindungen.
    range: InterestLink
    multivalued: true
    inlined_as_list: true

  role_label:
    description: |
      Descriptive label for the role when 'other' is selected in the RoleEnum.
    annotations:
      description_de: |
        Beschreibende Bezeichnung für die Rolle, wenn 'other' im RoleEnum ausgewählt ist.

# ENUMS
# ----------------------------------------------------------------

enums:
  NameTypeEnum:
    description: |
      Categories of name types according to https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI according to I14Y identifier but as class and not as attribute. Descriptions and translations according to I14Y.
    annotations:
      description_de: |
        Kategorien von Namenstypen gemäss https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI gemäss I14Y Identifier aber als Klasse und nicht als Atribut. Beschreibungen und Übersetzungen gemäss I14Y.
    permissible_values:
      PersonOfficialName:
        description: |
          According to the official catalogue of characters (No. 211) for the harmonisation of registers: Name according to official documents. The official name corresponds to the name appearing in the Swiss civil register. For foreign nationals with no civil status events in Switzerland, the official name corresponds to the name appearing on the foreign passport or identity card (see ‘Name according to foreign passport’ or SEM guidelines on the determination and spelling of names of foreign nationals dated 1 January 2012. If no official documents exist, see also ‘Name according to declaration’ (e.g. in the case of asylum seekers). The official name may consist of one or more parts.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 211) Registerharmonisierung: Name gemäss amtlichen Unterlagen. Der amtliche Name entspricht dem Namen im schweizerischen Zivilstandsregister. Bei ausländischen Personen ohne Zivilstandsereignis in der Schweiz entspricht dieser Name dem Namen im ausländischen Pass oder auf der Identitätskarte (siehe 214 sowie Weisung des SEM über die Bestimmung und Schreibweise der Namen von ausländischen Staatsangehörigen vom 1. Januar 2012. Im Ausnahmefall siehe auch "Name nach Deklaration" (z. B. Asyl), wenn keine amtlichen Dokumente vorliegen). Der amtliche Name kann aus einem oder mehreren Teilen bestehen.
        meaning: act:vocabulary/NameTypeEnum/PersonOfficialName

      PersonOriginalName:
        description: |
          According to the official catalogue of characters (No. 212) for the harmonisation of registers: Name of filiation according to official documents, which corresponds to the person's name before their first marriage or registered partnership. It may also be a maiden name acquired by decision to change one's name (see Art. 24, para. 2 OEC, RS 211.112.2).
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 212) Registerharmonisierung: Angestammter Name gemäss amtlichen Unterlagen, den eine Person unmittelbar vor ihrer ersten Eheschliessung oder Begründung einer eingetragenen Partnerschaft geführt hat oder, gestützt auf einen Namensänderungsentscheid, als neuen Ledignamen erworben hat (Art. 24 Abs. 2 ZStV, SR 211.112.2).
        meaning: act:vocabulary/NameTypeEnum/PersonOriginalName

      PersonAllianceName:
        description: |
          According to the official catalogue of characters (No. 213) for the harmonisation of registers: The alliance name shows the connection between two people who are married or living in a registered partnership. An alliance name that has already been used may be retained after the dissolution of the marriage or partnership if the official name has not been changed upon dissolution. It is attached to the official name with a hyphen and is formed with the partner's maiden name or the person's own maiden name. Upon request, the alliance name may be entered in the passport or on the identity card.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 213) Registerharmonisierung: Der Allianzname zeigt die Verbindung von zwei Personen auf, die verheiratet sind oder in einer eingetragenen Partnerschaft leben. Ein bereits verwendeter Allianzname kann nach Auflösung der Ehe oder der Partnerschaft weiterverwendet werden, wenn der amtliche Name bei der Auflösung nicht geändert wurde. Dabei wird dem amtlichen Namen mittels Bindestrich der Ledigname des Partners/der Partnerin oder der eigene Ledigname angehängt. Der Allianzname kann auf Antrag im Pass oder auf der Identitätskarte eingetragen werden.
        meaning: act:vocabulary/NameTypeEnum/PersonAllianceName

      PersonNameOnForeignPassport:
        description: |
          According to the official catalogue of characters (No. 214) for the harmonisation of registers: For persons of foreign nationality. This name corresponds to the entry marked in the machine-readable zone of the passport. If this zone includes abbreviated surnames or first names, these must, as far as possible, be recorded in full, according to the entry in the passport.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 214) Registerharmonisierung: Für Personen mit ausländischer Nationalität. Dieser Name entspricht dem Eintrag im Reisepass gemäss der maschinenlesbaren Zone (MRZ) des Reisepasses. Enthält die MRZ abgekürzte Namen oder Vornamen, sind diese möglichst in voller Länge gemäss visuell lesbarer Zone des Ausweispapiers zu erfassen.
        meaning: act:vocabulary/NameTypeEnum/PersonNameOnForeignPassport

      PersonAliasName:
        description: |
          According to the official character catalogue (No. 215) for the harmonisation of registers: Name (e.g. stage name, religious name) which, on the basis of an accepted application, may be used by the person. The alias name may consist of one or more parts (e.g. also the alias first name and alias surname).
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 215) Registerharmonisierung: Name (z. B. Künstler- oder Ordensname), der aufgrund eines bewilligten Gesuchs geführt werden darf. Der Aliasname kann aus einem oder mehreren Teilen (z. B. auch aus Aliasvorname und Aliasname) bestehen.
        meaning: act:vocabulary/NameTypeEnum/PersonAliasName

      PersonOtherName:
        description: |
          According to the official catalogue of characters (No. 216) for the harmonisation of registers: Other official names according to Swiss civil status documents (Art. 24, para. 3 OEC) or according to foreign documents, which are neither surnames nor first names.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 216) Registerharmonisierung: Weitere amtliche Namen gemäss schweizerischen Zivilstandsdokumenten (Art. 24 Abs. 3 ZStV) oder ausländischen Dokumenten, welche weder Familiennamen noch Vornamen sind.
        meaning: act:vocabulary/NameTypeEnum/PersonOtherName

      PersonDeclaredForeignerName:
        description: |
          According to the official catalogue of characters (No. 217) for the harmonisation of registers: For foreign nationals who do not have official documents (mainly in the field of asylum).
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 217) Registerharmonisierung: Für Personen mit ausländischer Nationalität, die keine offiziellen Dokumente besitzen (hauptsächlich im Asylbereich).
        meaning: act:vocabulary/NameTypeEnum/PersonDeclaredForeignerName
      

      # First Names
      # ----------------------------------------------------------------

      PersonFirstName:
        description: |
          First names taken from the birth certificate, the civil registry (Infostar) in the order in which they appear, or taken from foreign identity documents.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 221) Registerharmonisierung: Vornamen gemäss Geburtsurkunde oder Zivilstandsregister/Infostar in der aufgeführten Reihenfolge bzw. gemäss ausländischen Ausweispapieren.
        meaning: act:vocabulary/NameTypeEnum/PersonFirstName

      PersonCallFirstName:
        description: |
          A person has the right to choose a common first name from the list of their official first names. The common first name may consist of one or more first names (from those listed under ‘official first names’).
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 222) Registerharmonisierung: Eine Person hat das Recht, aus der Liste ihrer amtlichen Vornamen einen Rufnamen auszuwählen. Der Rufname kann aus einem oder mehreren Vornamen (aus den "amtlichen Vornamen") bestehen.
        meaning: act:vocabulary/NameTypeEnum/PersonCallFirstName

      PersonFirstNameOnForeignPassport:
        description: |
          For persons of foreign nationality. To be used in combination with the name as it appears on the foreign passport.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 223) Registerharmonisierung: Für Personen mit ausländischer Nationalität. Zu benutzen in Verbindung mit dem Namen im ausländischen Pass."
        meaning: act:vocabulary/NameTypeEnum/PersonFirstNameOnForeignPassport
      
      PersonDeclaredForeignerFirstName:
        description: |
          For persons of foreign nationality who do not have official documents (mainly in the field of asylum). To be used in combination with the defined Name according to declaration.
        annotations:
          description_de: |
            Gemäss amtlichen Katalog der Merkmale (Nr. 224) Registerharmonisierung: Für Personen mit ausländischer Nationalität, die keine amtlichen Dokumente besitzen (hauptsächlich im Asylbereich). Zu benutzen in Verbindung mit dem Namen gemäss Deklaration.
        meaning: act:vocabulary/NameTypeEnum/PersonDeclaredForeignerFirstName


