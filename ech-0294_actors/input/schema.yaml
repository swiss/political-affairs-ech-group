# HEADER 
# ----------------------------------------------------------------

id: https://ld.ech.ch/schema/0294/actors
name: actors-schema
title: Actors Schema
description: |
  [de] Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.
  [en] A schema describing political actors including persons, groups, memberships, and interest links.
license: CC-BY
prefixes:
  linkml: https://w3id.org/linkml/
  act: https://ld.ech.ch/schema/0294/actors/
  dcterms: http://purl.org/dc/terms/
default_prefix: act
default_range: string
imports:
  - linkml:types
  - ../../ech-0292_meta/input/schema_common

# CLASSES
# ----------------------------------------------------------------

classes:

  Container:
    tree_root: true
    description: |
      [de] Container für politische Akteure, Gruppen und Beziehungen.
      [en] Container for political actors, groups, and relationships.
    mixins:
      - HasIdentification
    slots:
      - persons
      - groups
      - memberships
      - interest_links

  Person:
    description: |
      [de] Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.
      [en] A person with identifiers, names, addresses, citizenships, and occupations.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
    slots:
      - label # Einfacher Name ohne Titel oder Berufsbezeichnung. 
      - label_long # Name inklusive aller Titel und Berufsbezeichnungen.
      - birth_year
      - birth_date
      - death_date
      - picture
      - names
      - addresses
      - language_proficiencies
      - citizenships
      - genders
      - occupations
      - trainings
      - contacts
      - electoral_district
      - interest_links

  Group:
    description: |
      [de] Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).
      [en] A political group, organization, or body (e.g., party, committee, parliament, department).
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - group_type
      - label
      - abbreviation
      - description
      - landing_page
      - parent_groups
      - spatial
      - contacts
      - addresses
      - statutes_url
      - party_color

  Membership:
    description: |
      [de] Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe.
      [en] A membership relationship between a person and a group.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - concerned_person
      - concerned_group
      - role_type
      - authorized_to_vote

  InterestLink:
    description: |
      [de] Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation.
      [en] An interest link (conflict of interest, political financing) of a person to an organization.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - concerned_person
      - interest_type
      - organization_label
      - organization_uid
      - organization_address
      - legal_form
      - is_paid
      - committee
      - function_role
  
  Name:
    description: |
      [de] Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.
      [en] A name with a type (e.g., call name, official name) and a value.
    mixins:
      - HasTemporalValidity
    slots:
      - name_type
      - value

  Address:
    description: |
      [de] Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.
      [en] An address with a type (e.g., private address, business address) and a value.
    slots:
      - address_type
      - address_uri
      - street_address
      - postal_code
      - postal_locality

  LanguageProficiency:
    description: |
      [de] Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.
      [en] Language proficiency of a person indicating the language and whether it is the preferred language or native language.
    slots:
      - language
      - is_correspondence
      - is_native

  Citizenship:
    description: |
      [de] Staatsangehörigkeit einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.
      [en] Citizenship (also used for Nationality) of a person indicating the country and temporal validity. If there is no `valid_from` provided, the information is not known. If it is known that the citizenship is valid from birth, the birthdate is to be repeated here. If there is no `valid_through`, the citizenship is still active.
    mixins: 
      - HasTemporalValidity
    slots:
      - country

  Gender:
    description: |
      [de] Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.
      [en] Gender of a person indicating a gender code and temporal validity.
    mixins:
      - HasTemporalValidity
    slots:
      - gender_code
      - pronouns

  Occupation:
    description: |
      [de] Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.
      [en] Occupation or profession of a person indicating a label, an ISCO-19 code, whether the position is paid, and temporal validity.
    mixins:
      - HasTemporalValidity
    slots:
      - is_paid
      - occupation_code
      - label
      - enterprise_uid
      - enterprise

  Training:
    description: |
      [de] Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.
      [en] Training or education of a person indicating a type (e.g., school diploma, university degree, military service), a label, an ISCO-19 code, and temporal validity.
    mixins:
      - HasTemporalValidity
    slots:
      - training_type
      - training_code
      - value

  Contact:
    description: |
      [de] Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.
      [en] Contact information of a person indicating a type (e.g., email, LinkedIn) and a value.
    slots:
      - contact_type
      - value
  
  ElectoralDistrict:
    description: |
      [de] Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.
      [en] Electoral district or region where a person is politically active; with temporal validity.
    mixins:
      - HasTemporalValidity
    slots:
      - district

  GroupType:
    description: |
      [de] Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).
      [en] Type of group (e.g., party, committee, parliament, department).
    slots:
      - group_type_enum
      - label

  RoleType:
    description: |
      [de] Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident, Stellvertreter).
      [en] Role of a person in a membership or function (e.g., member, president, deputy).
    slots:
      - role_type_enum
      - label

# SLOTS
# ----------------------------------------------------------------

slots:

  name_type:
    slot_uri: act:nameType
    description: |
      [de] Typ des Namens.
      [en] Type of name.
    range: NameTypeEnum

  address_type:
    slot_uri: act:addressType
    description: |
      [de] Typ der Adresse.
      [en] Type of address.
    range: AddressTypeEnum

  address_uri:
    slot_uri: act:addressURI
    description: |
      [de] URI der Adresse.
      [en] URI of the address.
    range: uriorcurie

  street_address:
    slot_uri: act:streetAddress
    description: |
      [de] Strassenadresse.
      [en] Street address.

  postal_code:
    slot_uri: act:postalCode
    description: |
      [de] Postleitzahl.
      [en] Postal code.
    range: integer

  postal_locality:
    slot_uri: act:postalLocality
    description: |
      [de] Ort.
      [en] Locality.

  is_correspondence:
    slot_uri: act:isCorrespondence
    description: |
      [de] Gibt an, ob es sich um die bevorzugte Sprache handelt.
      [en] Indicates if this is the preferred language.
    range: boolean

  is_native:
    slot_uri: act:isNative
    description: |
      [de] Gibt an, ob es sich um die Muttersprache handelt.
      [en] Indicates if this is the native language.
    range: boolean

  country:
    slot_uri: act:country
    description: |
      [de] ISO 3166 Ländercode.
      [en] ISO 3166 country code.
    pattern: ^[A-Z]{2}$

  gender_code:
    slot_uri: act:genderCode
    description: |
      [de] Geschlechtscode (z.B. gemäß ISO 5218).
      [en] Gender code (e.g., according to ISO 5218).

  pronouns:
    slot_uri: act:pronouns
    description: |
      [de] Von der Person verwendete Pronomen.
      [en] Pronouns used by the person.
    multivalued: true
    inlined_as_list: true

  is_paid:
    slot_uri: act:isPaid
    description: |
      [de] Gibt an, ob die Position bezahlt ist.
      [en] Indicates if the position is paid.
    range: boolean

  occupation_code:
    slot_uri: act:occupationCode
    description: |
      [de] ISCO-19 Code der Tätigkeit.
      [en] ISCO-19 code of the occupation.

  enterprise_uid:
    slot_uri: act:enterpriseUid
    description: |
      [de] UID des Unternehmens.
      [en] UID of the enterprise.

  enterprise:
    slot_uri: act:enterprise
    description: |
      [de] Name des Unternehmens.
      [en] Name of the enterprise.

  training_type:
    slot_uri: act:trainingType
    description: |
      [de] Typ der Ausbildung oder Bildung.
      [en] Type of training or education.
    range: TrainingTypeEnum

  training_code:
    slot_uri: act:trainingCode
    description: |
      [de] ISCO-19 Code der Ausbildung oder Bildung.
      [en] ISCO-19 code of the training or education.

  contact_type:
    slot_uri: act:contactType
    description: |
      [de] Typ der Kontaktinformation.
      [en] Type of contact information.
    range: ContactTypeEnum

  district:
    slot_uri: act:district
    description: |
      [de] Wahlkreis oder Wahlregion.
      [en] Electoral district or region.

  birth_year:
    slot_uri: act:birthYear
    description: |
      [de] Geburtsjahr.
      [en] Year of birth. Only to be used, if there is no full `birthDate` available.
    range: integer

  birth_date:
    slot_uri: schema:birthDate
    description: |
      [de] Genaues Geburtsdatum.
      [en] Exact date of birth if available and public. This field has precedence over the field `birthYear`.
    range: date

  death_date:
    slot_uri: schema:deathDate
    description: |
      [de] Genaues Todesdatum.
      [en] Exact date of death.
    range: date

  picture:
    range: uri
    description: |
      [de] Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).
      [en] Link to an image (preferred: PNG, then JPG, then GIF).

  group_type:
    range: GroupType
    slot_uri: act:groupType
    description: |
      [de] Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Bennenung und Beschreibung der Gruppierung wird über `name` gemacht.
      [en] Link to the group type.

  group_type_enum:
    slot_uri: act:groupTypeEnum
    description: |
      [de] Link zum kontrollierten Vokabular für Gruppentypen.
      [en] Link to the controlled vocabulary for group types.
    range: GroupTypeEnum

  abbreviation:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      [de] Abkürzung (kann mehrsprachig sein).
      [en] Abbreviation (can be multilingual).

  description:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      [de] Kurze Beschreibung der Gruppierung.
      [en] Description of the entity.

  landing_page:
    slot_uri: act:landingPage
    range: uri
    description: |
      [de] Website mit weiteren Informationen.
      [en] Website providing further information.

  parent_groups:
    slot_uri: act:parentGroup
    description: |
      [de] Übergeordneten Gruppe. Zum Beispiel die Mutterpartei, zu Kantonalenparteien. Oder zur Beschreibung der Hierarchie in Exekutive. Verknüpfung von Subkommissionen mit Kommissionen. (parentGroup wird immer im selben group_type verwendet.)
      [en] Link to parent groups.
    range: uriorcurie
    multivalued: true
    inlined_as_list: true

  spatial:
    description: |
      [de] Räumliche Referenz (BFS-Gemeindenummer, BFS-Kantonsnummer, z.B. ld.admin.ch/municipality/1234, ld.admin.ch/canton/23).
      [en] Spatial reference (fos-municipality number, fos-canton number, e.g., ld.admin.ch/municipality/1234, ld.admin.ch/canton/23).

  contacts:
    slot_uri: act:contact
    description: |
      [en] Contact information (email, website, social media).
      [de] Kontaktinformationen (E-Mail, Website, Social Media).
    range: Contact
    multivalued: true
    inlined_as_list: true

  addresses:
    slot_uri: act:address
    description: |
      [de] Adressen mit Typ (privat, geschäftlich, lokal).
      [en] Addresses with type (private, business, local).
    range: Address
    multivalued: true
    inlined_as_list: true

  statutes_url:
    slot_uri: act:statutesURL
    description: |
      [de] URL zu Parteistatuten (optional für Parteien).
      [en] URL to party statutes (optional for parties).

  party_color:
    slot_uri: act:partyColor
    description: |
      [de] Parteifarbe (optional für Parteien).
      [en] Party color (optional for parties).

  concerned_person:
    slot_uri: act:concernedPerson
    description: |
      [de] Link zu einer Person, auf die sich die Zugehörigkeit bezieht.
      [en] Link to a person that the affiliation concerns.
    range: Person

  concerned_group:
    slot_uri: act:concernedGroup
    description: |
      [de] Link zu einer Gruppe, auf die sich die Zugehörigkeit bezieht.
      [en] Link to a group that the affiliation concerns.
    range: Group

  role_type:
    slot_uri: act:roleType
    description: |
      [en] Role of the person in the membership or function.
      [de] Rolle der Person in der Mitgliedschaft oder Funktion.
    range: RoleType

  role_type_enum:
    slot_uri: act:roleTypeEnum
    range: RoleEnum
    description: |
      [en] Role of the person in the membership or function.
      [de] Rolle der Person in der Mitgliedschaft oder Funktion.

  authorized_to_vote:
    range: boolean
    slot_uri: act:authorizedToVote
    description: |
      [de] Gibt an, ob die Person stimmberechtigt ist.
      [en] Indicates if the person is authorized to vote.

  interest_type:
    range: InterestTypeEnum
    slot_uri: act:interestType
    required: true
    description: |
      [de] Art der Interessenbindung (Berufliche Tätigkeit, Politische Ämter, Verein).
      [en] Type of interest link (professional activity, political office, association).

  organization_label:
    slot_uri: act:organizationLabel
    description: |
      [en] Label of the organization.
      [de] Bezeichnung der Organisation.

  organization_uid:
    slot_uri: act:organizationUid
    description: |
      [en] UID of the organization (for analysis with NOGA codes, etc.).
      [de] UID der Organisation (für Auswertungen mit NOGA-Codes, etc.).

  organization_address:
    slot_uri: act:organizationAddress
    description: |
      [en] Address of the organization.
      [de] Adresse der Organisation.

  legal_form:
    slot_uri: act:legalForm
    description: |
      [en] Legal form of the organization.
      [de] Rechtsform der Organisation.

  committee:
    slot_uri: act:committee
    description: |
      [en] Committee or board (e.g., foundation board, board of directors).
      [de] Gremium (z.B. Stiftungsrat, Verwaltungsrat).

  function_role:
    slot_uri: act:functionRole
    description: |
      [en] Function or role in the organization.
      [de] Funktion oder Rolle in der Organisation.

  names:
    slot_uri: act:name
    description: |
      [en] Names of the person with type and value.
      [de] Namen der Person mit Typ und Wert.
    range: Name
    multivalued: true
    inlined_as_list: true

  language_proficiencies:
    slot_uri: act:languageProficiency
    description: |
      [de] Sprachkompetenzen der Person.
      [en] Language proficiencies of the person.
    range: LanguageProficiency

    multivalued: true
    inlined_as_list: true

  citizenships:
    slot_uri: act:citizenship
    description: |
      [de] Staatsbürgerschaften der Person.
      [en] Citizenships of the person.
    range: Citizenship
    multivalued: true
    inlined_as_list: true

  genders:
    slot_uri: act:gender
    description: |
      [de] Geschlecht der Person.
      [en] Gender of the person.
    range: Gender
    multivalued: true
    inlined_as_list: true

  occupations:
    slot_uri: act:occupation
    description: |
      [de] Berufe oder Tätigkeiten der Person.
      [en] Occupations or professions of the person.
    range: Occupation
    multivalued: true
    inlined_as_list: true

  trainings:
    slot_uri: act:training
    description: |
      [de] Ausbildungen oder Bildungen der Person.
      [en] Trainings or educations of the person.
    range: Training
    multivalued: true
    inlined_as_list: true

  electoral_district:
    slot_uri: act:electoralDistrict
    description: |
      [de] Link zum Wahlbezirk.
      [en] Link to the electoral district.
    range: ElectoralDistrict

  persons:
    slot_uri: act:person
    description: |
      [de] Sammlung von Personen.
      [en] Collection of persons.
    range: Person
    multivalued: true
    inlined_as_list: true

  groups:
    slot_uri: act:group
    description: |
      [de] Sammlung von Gruppen.
      [en] Collection of groups.
    range: Group
    multivalued: true
    inlined_as_list: true

  memberships:
    slot_uri: act:membership
    description: |
      [de] Sammlung von Mitgliedschaften.
      [en] Collection of memberships.
    range: Membership
    multivalued: true
    inlined_as_list: true

  interest_links:
    slot_uri: act:interestLink
    description: |
      [de] Sammlung von Interessenbindungen.
      [en] Collection of interest links.range: InterestLink
    range: InterestLink
    multivalued: true
    inlined_as_list: true

  role_label:
    description: |
      [en] Descriptive label for the role when 'other' is selected in the RoleEnum.
      [de] Beschreibende Bezeichnung für die Rolle, wenn 'other' im RoleEnum ausgewählt ist.

# ENUMS
# ----------------------------------------------------------------

enums:

  NameTypeEnum:
    description: |
      [de] Kategorien von Namenstypen gemäss https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI gemäss I14Y Identifier aber als Klasse und nicht als Atribut. Beschreibungen und Übersetzungen gemäss I14Y.
      [en] Categories of name types according to https://dam-api.bfs.admin.ch/hub/api/dam/assets/24565576/master, URI according to I14Y identifier but as class and not as attribute. Descriptions and translations according to I14Y.
    permissible_values:
      
      # Names
      # ----------------------------------------------------------------
      
      PersonOfficialName:
        description: |
          [de] Gemäss amtlichen Katalog der Merkmale (Nr. 211) Registerharmonisierung: Name gemäss amtlichen Unterlagen. Der amtliche Name entspricht dem Namen im schweizerischen Zivilstandsregister. Bei ausländischen Personen ohne Zivilstandsereignis in der Schweiz entspricht dieser Name dem Namen im ausländischen Pass oder auf der Identitätskarte (siehe 214 sowie Weisung des SEM über die Bestimmung und Schreibweise der Namen von ausländischen Staatsangehörigen vom 1. Januar 2012. Im Ausnahmefall siehe auch "Name nach Deklaration" (z. B. Asyl), wenn keine amtlichen Dokumente vorliegen). Der amtliche Name kann aus einem oder mehreren Teilen bestehen.  
          [fr] Selon le catalogue officiel des caractères (n° 211) de l'harmonisation des registres : Nom selon les documents officiels. Le nom officiel correspond au nom figurant dans le registre suisse de l’état civil. Pour les personnes de nationalité étrangère sans événement d’état civil en Suisse, le nom officiel correspond au nom figurant sur le passeport étranger ou la carte d’identité (voir "Nom selon le passeport étranger" ou directives du SEM sur la détermination et l’orthographe des noms de ressortissants étrangers du 1er janvier 2012. Si des documents officiels n’existent pas, voir aussi "Nom selon déclaration" (par ex. en cas d’asile). Le nom officiel peut se composer d’une ou de plusieurs parties.
          [it] Secondo il catalogo ufficiale delle caratteristiche (n. 211) dell'armonizzazione dei registri: Cognome secondo i documenti ufficiali. Il cognome ufficiale corrisponde a quello riportato nel registro svizzero dello stato civile. Per le persone straniere senza evento dello stato civile in Svizzera il cognome ufficiale corrisponde a quello indicato sul passaporto straniero o sulla carta d’identità (si veda "Cognome sul passaporto straniero" e l’istruzione della SEM sulla determinazione e l’ortografia dei nomi di cittadini stranieri del 1° gennaio 2012. In casi eccezionali si veda anche la voce "Cognome dichiarato" (es. asilo), in mancanza di documenti ufficiali). Il cognome ufficiale può anche essere composto.
          [en] According to the official catalogue of characters (No. 211) for the harmonisation of registers: Name according to official documents. The official name corresponds to the name appearing in the Swiss civil register. For foreign nationals with no civil status events in Switzerland, the official name corresponds to the name appearing on the foreign passport or identity card (see ‘Name according to foreign passport’ or SEM guidelines on the determination and spelling of names of foreign nationals dated 1 January 2012. If no official documents exist, see also ‘Name according to declaration’ (e.g. in the case of asylum seekers). The official name may consist of one or more parts.
        meaning: act:vocabulary/NameTypeEnum/PersonOfficialName

      PersonOriginalName:
        description: |
          [de] Gemäss amtlichen Katalog der Merkmale (Nr. 212) Registerharmonisierung: Angestammter Name gemäss amtlichen Unterlagen, den eine Person unmittelbar vor ihrer ersten Eheschliessung oder Begründung einer eingetragenen Partnerschaft geführt hat oder, gestützt auf einen Namensänderungsentscheid, als neuen Ledignamen erworben hat (Art. 24 Abs. 2 ZStV, SR 211.112.2).
          [fr] Selon le catalogue officiel des caractères (n° 212) de l'harmonisation des registres : Nom de filiation selon les documents officiels, lequel correspond au nom de la personne avant son premier mariage ou partenariat enregistré. Il peut aussi s’agir d’un nom de célibataire acquis par décision de changement de nom (cf. art. 24, al. 2 OEC, RS 211.112.2). 
          [it] Secondo il catalogo ufficiale delle caratteristiche (n. 212) dell'armonizzazione dei registri: Cognome riportato sulla documentazione ufficiale che una persona aveva immediatamente prima della celebrazione del primo matrimonio o della costituzione della prima unione domestica registrata o che ha acquisito come nuovo cognome da celibe / nubile in seguito alla decisione concernente il cambiamento del cognome (art. 24 cpv. 2 OSC, RS 211.112.2).
          [en] According to the official catalogue of characters (No. 212) for the harmonisation of registers: Name of filiation according to official documents, which corresponds to the person's name before their first marriage or registered partnership. It may also be a maiden name acquired by decision to change one's name (see Art. 24, para. 2 OEC, RS 211.112.2).
        meaning: act:vocabulary/NameTypeEnum/PersonOriginalName

      PersonAllianceName:
        meaning: act:vocabulary/NameTypeEnum/PersonAllianceName

      PersonNameOnForeignPassport:
        meaning: act:vocabulary/NameTypeEnum/PersonNameOnForeignPassport

      PersonAliasName:
        meaning: act:vocabulary/NameTypeEnum/PersonAliasName

      PersonOtherName:
        meaning: act:vocabulary/NameTypeEnum/PersonOtherName

      PersonDeclaredForeignerName:
        meaning: act:vocabulary/NameTypeEnum/PersonDeclaredForeignerName
      

      # First Names
      # ----------------------------------------------------------------

      PersonFirstName:
        meaning: act:vocabulary/NameTypeEnum/PersonFirstName

      PersonCallFirstName:
        meaning: act:vocabulary/NameTypeEnum/PersonCallFirstName

      PersonFirstNameOnForeignPassport:
        meaning: act:vocabulary/NameTypeEnum/PersonFirstNameOnForeignPassport
      
      PersonDeclaredForeignerFirstName:
        meaning: act:vocabulary/NameTypeEnum/PersonDeclaredForeignerFirstName


  AddressTypeEnum:
    description: |
      [en] Types of addresses.
      [de] Adresstypen.
