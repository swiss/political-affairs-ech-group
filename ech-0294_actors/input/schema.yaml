# HEADER 
# ----------------------------------------------------------------

id: https://ld.ech.ch/schema/0294/actors
name: actors-schema
title: Actors Schema
description: |
  A schema describing political actors including persons, groups, memberships, and interest links.
annotations:
  description_de: |
    Ein Schema zur Beschreibung politischer Akteure einschliesslich Personen, Gruppen, Mitgliedschaften und Interessenbindungen.
license: CC-BY
prefixes:
  linkml: https://w3id.org/linkml/
  act: https://ld.ech.ch/schema/0294/actors/
  dcterms: http://purl.org/dc/terms/
default_prefix: act
default_range: string
imports:
  - linkml:types
  - ../../ech-0292_meta/input/schema_common

# CLASSES
# ----------------------------------------------------------------

classes:
  Container:
    tree_root: true
    description: |
      Container for political actors, groups, and relationships.
    annotations:
      description_de: |
        Container für politische Akteure, Gruppen und Beziehungen.
    mixins:
      - HasIdentification
    slots:
      - persons
      - groups
      - memberships
      - interest_links

  Person:
    description: |
      A person with identifiers, names, addresses, citizenships, and occupations.
    annotations:
      description_de: |
        Eine Person mit Identifikatoren, Namen, Adressen, Staatsbürgerschaften und Berufen.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
    slots:
      - label # Mandatory short display name to identify the person within the organisation (e.g. added birthyear).
      - label_long # Display name with academic titles.
      - birth_year
      - birth_date
      - death_date
      - picture
      - names
      - addresses
      - language_proficiencies
      - citizenships
      - genders
      - occupations
      - trainings
      - contacts
      - electoral_district
      - interest_links
    slot_usage:
      label:
        description: |
          Mandatory short display name to identify the person within the organisation (e.g. with added birth year to distinguish persons with the same name). Preferred: PersonOfficialName combined with PersonCallFirstName.
        annotations:
          description_de: |
            Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen). Bevorzugt: PersonOfficialName (amtlicher Name) kombiniert mit PersonCallFirstName (Rufname).
        required: true
      label_long:
        description: |
          Optional long display name including academic titles and full official name (e.g. "Dr. Maria Muster-Beispiel").
        annotations:
          description_de: |
            Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

  Group:
    description: |
      A political group, organization, or body (e.g., party, committee, parliament, department).
    annotations:
      description_de: |
        Eine politische Gruppe, Organisation oder Körperschaft (z.B. Partei, Kommission, Parlament, Departement).
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - group_type
      - label
      - abbreviation
      - description
      - landing_page
      - parent_groups
      - spatial
      - contacts
      - addresses
      - statutes_url
      - party_color

  PersonReference:
    description: |
      Lightweight reference to a person with key identification data at time of linking. Preserves historical accuracy even if the person changes later.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Person mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung. Ermöglicht historische Korrektheit auch wenn sich die Person später ändert.
    mixins:
      - HasIdentification
    slots:
      - label
      - label_long
      - role_type
      - group_label
    slot_usage:
      label:
        description: |
          Mandatory short display name to identify the person within the organisation (e.g. with added birth year to distinguish persons with the same name).
        annotations:
          description_de: |
            Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen).
        required: true
      label_long:
        description: |
          Optional long display name including academic titles and full official name (e.g. "Dr. Maria Muster-Beispiel").
        annotations:
          description_de: |
            Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

  GroupReference:
    description: |
      Lightweight reference to a group with key identification data at time of linking.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Gruppe mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung.
    mixins:
      - HasIdentification
    slots:
      - label
      - abbreviation
      - group_type

  Membership:
    description: |
      A membership relationship between a person and a group, representing formal affiliation (e.g., party member, commission member, parliamentarian). Distinct from InterestLink, which covers external interest bindings and conflicts of interest to organizations outside the actor schema.
    annotations:
      description_de: |
        Eine Mitgliedschaftsbeziehung zwischen einer Person und einer Gruppe, die eine formale Zugehörigkeit darstellt (z.B. Parteimitglied, Kommissionsmitglied, Parlamentarier/in). Im Unterschied zu InterestLink, der externe Interessenbindungen und Interessenkonflikte zu Organisationen ausserhalb des Akteur-Schemas abbildet.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - person_reference
      - group_reference
      - role_type
      - authorized_to_vote
      - is_active
    slot_usage:
      is_active:
        description: |
          Indicates if the membership is currently active. Can complement or replace `valid_from`/`valid_through`. If not set, activity is derived from the temporal validity fields.
        annotations:
          description_de: |
            Gibt an, ob die Mitgliedschaft derzeit aktiv ist. Kann `valid_from`/`valid_through` ergänzen oder ersetzen. Wenn nicht gesetzt, wird die Aktivität aus den zeitlichen Gültigkeitsfeldern abgeleitet.

  InterestLink:
    description: |
      An interest link (conflict of interest, political financing) of a person to an organization outside the actor schema.
    annotations:
      description_de: |
        Eine Interessenbindung (Interessenkonflikt, Politikfinanzierung) einer Person zu einer Organisation ausserhalb des Akteur-Schemas.
    mixins:
      - HasIdentification
      - HasCreationModificationDates
      - HasTemporalValidity
    slots:
      - person_reference
      - interest_type
      - organization_name
      - organization_uid
      - organization_address
      - legal_form
      - is_paid
      - committee
      - function_role
  
  Name:
    description: |
      A name with a type (e.g., call name, official name), a value, and a temporal validity.
    annotations:
      description_de: |
        Ein Name mit einem Typ (z.B. Rufname, amtlicher Name) und einem Wert und einer zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - name_type
      - value

  Address:
    description: |
      An address with a type (e.g., private address, business address) and a value.
    annotations:
      description_de: |
        Eine Adresse mit einem Typ (z.B. Privatadresse, Geschäftsadresse) und einem Wert.
    slots:
      - address_type
      - address_uri
      - street_address
      - postal_code
      - postal_locality

  LanguageProficiency:
    description: |
      Language proficiency of a person indicating the language and whether it is the preferred language or native language.
    annotations:
      description_de: |
        Sprachkenntnisse einer Person mit Angabe der Sprache und ob es sich um die bevorzugte Sprache oder die Muttersprache handelt.
    slots:
      - language
      - is_correspondence
      - is_native

  Citizenship:
    description: |
      Citizenship (also used for Nationality) of a person indicating the country and temporal validity. If there is no `valid_from` provided, the information is not known. If it is known that the citizenship is valid from birth, the birthdate is to be repeated here. If there is no `valid_through`, the citizenship is still active.
    annotations:
      description_de: |
        Staatsangehörigkeit (wird auch für Nationalität verwendet) einer Person unter Angabe des Landes und der zeitlichen Gültigkeit. Wenn kein `valid_from` angegeben ist, ist diese Information nicht bekannt. Ist bekannt, dass die Staatsangehörigkeit seit der Geburt gültig ist, ist das Geburtsdatum hier anzugeben. Wenn kein `valid_through` angegeben ist, ist die Staatsangehörigkeit weiterhin gültig.
    mixins: 
      - HasTemporalValidity
    slots:
      - country

  Gender:
    description: |
      Gender of a person indicating a gender code and temporal validity.
    annotations:
      description_de: |
        Geschlecht einer Person mit Angabe eines Geschlechtscodes und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - gender_code
      - pronouns

  Occupation:
    description: |
      Occupation or profession of a person indicating a label, an ISCO-19 code, whether the position is paid, and temporal validity.
    annotations:
      description_de: |
        Beruf oder Tätigkeit einer Person mit Angabe eines Labels, eines ISCO-19 Codes, ob die Position bezahlt ist, und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - is_paid
      - occupation_code
      - label
      - organization_uid
      - organization_name

  Training:
    description: |
      Training or education of a person indicating a type (e.g., school diploma, university degree, military service), a label, an ISCO-19 code, and temporal validity.
    annotations:
      description_de: |
        Ausbildung oder Bildung einer Person mit Angabe eines Typs (z.B. Schulabschluss, Universitätsabschluss, Militärdienst), eines Labels, eines ISCO-19 Codes und der zeitlichen Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - training_type
      - training_code
      - value

  Contact:
    description: |
      Contact information of a person indicating a type (e.g., email, LinkedIn) and a value.
    annotations:
      description_de: |
        Kontaktinformation einer Person mit Angabe eines Typs (z.B. E-Mail, LinkedIn) und eines Werts.
    slots:
      - contact_type
      - value
  
  ElectoralDistrict:
    description: |
      Electoral district or region where a person is politically active; with temporal validity.
    annotations:
      description_de: |
        Wahlkreis oder Wahlregion, in der eine Person politisch aktiv ist; mit zeitlicher Gültigkeit.
    mixins:
      - HasTemporalValidity
    slots:
      - district

  GroupType:
    description: |
      Type of group (e.g., party, committee, parliament, department).
    annotations:
      description_de: |
        Art der Gruppe (z.B. Partei, Kommission, Parlament, Departement).
    slots:
      - group_type_enum
      - label

  RoleType:
    description: |
      Role of a person in a membership or function (e.g., member, president, deputy).
    annotations:
      description_de: |
        Rolle einer Person in einer Mitgliedschaft oder Funktion (z.B. Mitglied, Präsident, Stellvertreter).
    slots:
      - role_type_enum
      - label

# SLOTS
# ----------------------------------------------------------------

slots:
  name_type:
    slot_uri: act:nameType
    description: |
      Type of name according to eCH-0011 (personNameData).
    annotations:
      description_de: |
        Typ des Namens gemäss eCH-0011 (personNameData).
    range: NameTypeEnum

  address_type:
    slot_uri: act:addressType
    description: |
      Type of address.
    annotations:
      description_de: |
        Typ der Adresse.
    range: AddressTypeEnum

  address_uri:
    slot_uri: act:addressURI
    description: |
      URI of the address from the Swiss federal building address register. The layer can be accessed at https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Example of a valid URI: https://geo.ld.admin.ch/location/address/101904050
    annotations:
      description_de: |
        URI der Adresse aus dem eidgenössischen Gebäudeadressverzeichnis. Der Layer ist zugänglich unter https://map.geo.admin.ch/#/map?topic=ech&layers=ch.swisstopo.amtliches-gebaeudeadressverzeichnis. Beispiel einer gültigen URI: https://geo.ld.admin.ch/location/address/101904050
    range: uriorcurie

  street_address:
    slot_uri: act:streetAddress
    description: |
      Street address.
    annotations:
      description_de: |
        Strassenadresse.

  postal_code:
    slot_uri: act:postalCode
    description: |
      Postal code.
    annotations:
      description_de: |
        Postleitzahl.
    range: integer

  postal_locality:
    slot_uri: act:postalLocality
    description: |
      Locality.
    annotations:
      description_de: |
        Ort.

  is_correspondence:
    slot_uri: act:isCorrespondence
    description: |
      Indicates if this is the preferred language.
    annotations:
      description_de: |
        Gibt an, ob es sich um die bevorzugte Sprache handelt.
    range: boolean

  is_native:
    slot_uri: act:isNative
    description: |
      Indicates if this is the native language.
    annotations:
      description_de: |
        Gibt an, ob es sich um die Muttersprache handelt.
    range: boolean

  country:
    slot_uri: act:country
    description: |
      ISO 3166-1 alpha-2 country code.
    annotations:
      description_de: |
        ISO 3166-1 alpha-2 Ländercode.
    pattern: ^[A-Z]{2}$

  gender_code:
    slot_uri: act:genderCode
    description: |
      Gender code. Recommended values: male, female, diverse.
    annotations:
      description_de: |
        Geschlechtscode. Empfohlene Werte: male, female, diverse .
    range: GenderCodeEnum

  pronouns:
    slot_uri: act:pronouns
    description: |
      Pronouns used by the person.
    annotations:
      description_de: |
        Von der Person verwendete Pronomen.
    multivalued: true
    inlined_as_list: true

  is_paid:
    slot_uri: act:isPaid
    description: |
      Indicates if the position is paid.
    annotations:
      description_de: |
        Gibt an, ob die Position bezahlt ist.
    range: boolean

  occupation_code:
    slot_uri: act:occupationCode
    description: |
      ISCO-19 code of the occupation.
    annotations:
      description_de: |
        ISCO-19 Code der Tätigkeit.

  training_type:
    slot_uri: act:trainingType
    description: |
      Type of training or education.
    annotations:
      description_de: |
        Typ der Ausbildung oder Bildung.
    range: TrainingTypeEnum

  training_code:
    slot_uri: act:trainingCode
    description: |
      ISCO-19 code of the training or education.
    annotations:
      description_de: |
        ISCO-19 Code der Ausbildung oder Bildung.

  contact_type:
    slot_uri: act:contactType
    description: |
      Type of contact information.
    annotations:
      description_de: |
        Typ der Kontaktinformation.
    range: ContactTypeEnum

  district:
    slot_uri: act:district
    description: |
      Electoral district or region.
    annotations:
      description_de: |
        Wahlkreis oder Wahlregion.

  birth_year:
    slot_uri: act:birthYear
    description: |
      Year of birth. Only to be used, if there is no full `birthDate` available.
    annotations:
      description_de: |
        Geburtsjahr. Nur zu verwenden, wenn kein vollständiges `birthDate` vorhanden ist.
    range: integer

  birth_date:
    slot_uri: schema:birthDate
    description: |
      Exact date of birth if available and public. This field has precedence over the field `birthYear`.
    annotations:
      description_de: |
        Genaues Geburtsdatum, sofern verfügbar und öffentlich. Dieses Feld hat Vorrang vor dem Feld `birthYear`.
    range: date

  death_date:
    slot_uri: schema:deathDate
    description: |
      Exact date of death.
    annotations:
      description_de: |
        Genaues Todesdatum.
    range: date

  picture:
    range: uri
    description: |
      Link to an image (preferred: PNG, then JPG, then GIF).
    annotations:
      description_de: |
        Link zu einem Bild (bevorzugt: PNG, dann JPG, dann GIF).

  group_type:
    range: GroupType
    slot_uri: act:groupType
    description: |
      Type of group (e.g., party, commission, parliament, or similar). The exact naming and description of the group is provided via `label`.
    annotations:
      description_de: |
        Klasse der Gruppierung, wie z.B. Partei, Kommission, Parlament oder ähnliches. Die genaue Benennung und Beschreibung der Gruppierung wird über `label` gemacht.

  group_type_enum:
    slot_uri: act:groupTypeEnum
    description: |
      Link to the controlled vocabulary for group types.
    annotations:
      description_de: |
        Link zum kontrollierten Vokabular für Gruppentypen.
    range: GroupTypeEnum

  abbreviation:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      Abbreviation (can be multilingual).
    annotations:
      description_de: |
        Abkürzung (kann mehrsprachig sein).

  description:
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      Description of the entity.
    annotations:
      description_de: |
        Kurze Beschreibung der Gruppierung.

  landing_page:
    slot_uri: act:landingPage
    range: uri
    description: |
      Website providing further information.
    annotations:
      description_de: |
        Website mit weiteren Informationen.

  parent_groups:
    slot_uri: act:parentGroup
    description: |
      Link to parent groups. For example, the parent party for cantonal parties, or to describe the hierarchy in the executive. Also used to link sub-commissions to commissions, or factions to both their parliament and their party. (parentGroup is typically used within the same group_type, but cross-type links are permitted, e.g., faction → parliament and faction → party.)
    annotations:
      description_de: |
        Übergeordnete Gruppe. Zum Beispiel die Mutterpartei zu Kantonalparteien, oder zur Beschreibung der Hierarchie in der Exekutive. Auch zur Verknüpfung von Subkommissionen mit Kommissionen oder Fraktionen mit Parlament und Partei. (parentGroup wird typischerweise im selben group_type verwendet, typenübergreifende Verknüpfungen sind aber erlaubt, z.B. Fraktion → Parlament und Fraktion → Partei.)
    range: uriorcurie
    multivalued: true
    inlined_as_list: true

  spatial:
    description: |
      Spatial reference (fos-municipality number, fos-canton number, or country). Formats: municipality: ld.admin.ch/municipality/1234, canton: ld.admin.ch/canton/23, country: ld.admin.ch/country/CHE.
    annotations:
      description_de: |
        Räumliche Referenz (BFS-Gemeindenummer, BFS-Kantonsnummer oder Land). Formate: Gemeinde: ld.admin.ch/municipality/1234, Kanton: ld.admin.ch/canton/23, Bund: ld.admin.ch/country/CHE.

  contacts:
    slot_uri: act:contact
    description: |
      Contact information (email, website, social media). Guideline: email is quasi-mandatory and should always be provided where available.
    annotations:
      description_de: |
        Kontaktinformationen (E-Mail, Website, Social Media). Richtlinie: E-Mail ist quasi-obligatorisch und sollte wenn vorhanden immer angegeben werden.
    range: Contact
    multivalued: true
    inlined_as_list: true

  addresses:
    slot_uri: act:address
    description: |
      Addresses with type (private, business, local).
    annotations:
      description_de: |
        Adressen mit Typ (privat, geschäftlich, lokal).
    range: Address
    multivalued: true
    inlined_as_list: true
    examples:
      value:
        - address_type: businessAddress
          address_URI: https://ld.admin.ch/address/12345
          street_address: Bundesplatz 3
          postal_code: "3003"
          postal_locality: Bern
        - address_type: privateAddress
          postal_locality: Zürich

  statutes_url:
    slot_uri: act:statutesURL
    description: |
      URL to party statutes (PDF or webpage; optional for parties).
    annotations:
      description_de: |
        URL zu Parteistatuten (PDF oder Webseite; optional für Parteien).

  party_color:
    slot_uri: act:partyColor
    description: |
      Party color as hexadecimal value (optional for parties, e.g., "#FF0000").
    annotations:
      description_de: |
        Parteifarbe als Hexadezimalwert (optional für Parteien, z.B. "#FF0000").

  person_reference:
    slot_uri: act:personReference
    description: |
      Reference to a person with snapshot data at time of linking.
    annotations:
      description_de: |
        Referenz auf eine Person mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.
    range: PersonReference
    inlined: true

  group_reference:
    slot_uri: act:groupReference
    description: |
      Reference to a group with snapshot data at time of linking.
    annotations:
      description_de: |
        Referenz auf eine Gruppe mit Snapshot-Daten zum Zeitpunkt der Verknüpfung.
    range: GroupReference
    inlined: true

  group_label:
    slot_uri: act:groupLabel
    description: |
      Name of the body/group at time of linking.
    annotations:
      description_de: |
        Name des Gremiums zum Zeitpunkt der Verknüpfung.

  role_type:
    slot_uri: act:roleType
    description: |
      Role of the person in the membership or function.
    annotations:
      description_de: |
        Rolle der Person in der Mitgliedschaft oder Funktion.
    range: RoleType

  role_type_enum:
    slot_uri: act:roleTypeEnum
    range: RoleEnum
    description: |
      Role of the person in the membership or function.
    annotations:
      description_de: |
        Rolle der Person in der Mitgliedschaft oder Funktion.

  authorized_to_vote:
    range: boolean
    slot_uri: act:authorizedToVote
    description: |
      Indicates if the person is authorized to vote in the group. Typically false for substitute members (when not deputizing), observers, secretaries, and guests.
    annotations:
      description_de: |
        Gibt an, ob die Person in der Gruppe stimmberechtigt ist. Typischerweise false für Ersatzmitglieder (wenn nicht im Einsatz), Beobachter/innen, Sekretär/innen und Gäste.

  interest_type:
    range: InterestTypeEnum
    slot_uri: act:interestType
    required: true
    description: |
      Type of interest link (professional activity, political office, association).
    annotations:
      description_de: |
        Art der Interessenbindung (Berufliche Tätigkeit, Politische Ämter, Verein).

  organization_name:
    slot_uri: act:organizationName
    description: |
      Name of the organization or enterprise.
    annotations:
      description_de: |
        Name der Organisation oder des Unternehmens.

  organization_uid:
    slot_uri: act:organizationUid
    description: |
      UID of the organization (eCH-0097 format: CHE-XXX.XXX.XXX of the federal UID register (uid.admin.ch).
    annotations:
      description_de: |
        UID der Organisation (für Auswertungen mit NOGA-Codes, etc.).
    pattern: ^CHE-\d{3}\.\d{3}\.\d{3}$

  organization_address:
    slot_uri: act:organizationAddress
    description: |
      Address of the organization.
    annotations:
      description_de: |
        Adresse der Organisation.

  legal_form:
    slot_uri: act:legalForm
    description: |
      Legal form of the organization. See controlled vocabulary: https://register.ld.admin.ch/i14y/concept/legalForm
    annotations:
      description_de: |
        Rechtsform der Organisation. Siehe kontrolliertes Vokabular: https://register.ld.admin.ch/i14y/concept/legalForm
    range: LegalFormEnum

  committee:
    slot_uri: act:committee
    description: |
      Committee or board within the organization (e.g., Verwaltungsrat, Stiftungsrat, Vorstand, Aufsichtsrat, Beirat, Geschäftsleitung).
    annotations:
      description_de: |
        Gremium innerhalb der Organisation (z.B. Verwaltungsrat, Stiftungsrat, Vorstand, Aufsichtsrat, Beirat, Geschäftsleitung).

  function_role:
    slot_uri: act:functionRole
    description: |
      Function or role in the organization (e.g., Präsident/in, Vizepräsident/in, Mitglied, Delegierter, Geschäftsführer/in, Berater/in).
    annotations:
      description_de: |
        Funktion oder Rolle in der Organisation (z.B. Präsident/in, Vizepräsident/in, Mitglied, Delegierter, Geschäftsführer/in, Berater/in).

  names:
    slot_uri: act:name
    description: |
      Names of the person with type and value.
    annotations:
      description_de: |
        Namen der Person mit Typ und Wert.
    range: Name
    multivalued: true
    inlined_as_list: true

  language_proficiencies:
    slot_uri: act:languageProficiency
    description: |
      Language proficiencies of the person.
    annotations:
      description_de: |
        Sprachkompetenzen der Person.
    range: LanguageProficiency
    multivalued: true
    inlined_as_list: true

  citizenships:
    slot_uri: act:citizenship
    description: |
      Citizenships of the person.
    annotations:
      description_de: |
        Staatsbürgerschaften der Person.
    range: Citizenship
    multivalued: true
    inlined_as_list: true

  genders:
    slot_uri: act:gender
