# HEADER
# ----------------------------------------------------------------

id: https://ld.ech.ch/schema/0292/meta-common
name: meta-common-schema
title: Meta Common Schema
description: |
  This schema provides common elements (classes, slots) for use in other eCH LinkML schemas.
annotations:
  description_de: |
    Dieses Schema stellt gemeinsame Elemente (Klassen, Slots) zur Nutzung in anderen eCH LinkML Schemata zur Verfügung.
  description_fr: |
    Ce schéma fournit des éléments communs (classes, slots) destinés à être utilisés dans d'autres schémas LinkML eCH.
license: CC-BY
prefixes:
  xsd: http://www.w3.org/2001/XMLSchema#
  prov: http://www.w3.org/ns/prov#
  dcterms: http://purl.org/dc/terms/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  mcm: https://ld.ech.ch/schema/0292/meta-common/
default_prefix: mcm
default_range: string
imports:
  - linkml:types

# CLASSES
# ----------------------------------------------------------------

classes:

  HasTemporalValidity:
    mixin: true
    description: |
      A mixin class that provides slots for modeling a temporal validity of information (not of an event).
    annotations:
      description_de: |
        Eine Mixin-Klasse, die Slots für die Modellierung einer zeitlichen Gültigkeit einer Information (nicht eines Events) zur Verfügung stellt.
      description_fr: |
        Une classe mixin qui fournit des slots pour modéliser la validité temporelle d'une information (et non d'un événement).
    slots:
      - valid_from
      - valid_through
      - is_active

  HasIdentification:
    mixin: true
    description: |
      A mixin class that provides slots for the identification of an entity.
    annotations:
      description_de: |
        Eine Mixin-Klasse, die Slots für die Identifikation einer Entität zur Verfügung stellt.
      description_fr: |
        Une classe mixin qui fournit des slots pour l'identification d'une entité.
    slots:
      - local_id
      - global_uri
      - wikidata_uri

  IsInstantaneousEvent:
    mixin: true
    description: |
      A mixin class that provides slots for modeling instantaneous events or occurrences (without time duration).
    annotations:
      description_de: |
        Eine Mixin-Klasse, die Slots für die Modellierung von instantanen Ereignissen oder Vorkommnissen (ohne Zeitdauer) zur Verfügung stellt.
      description_fr: |
        Une classe mixin qui fournit des slots pour modéliser des événements ou occurrences instantanés (sans durée).
    slots:
      - date_actual
      - datetime_actual
      - date_planned
      - datetime_planned

  IsEventWithDuration:
    mixin: true
    description: |
      A mixin class that provides slots for modeling events or occurrences with time duration.
    annotations:
      description_de: |
        Eine Mixin-Klasse, die Slots für die Modellierung von Ereignissen oder Vorkommnissen mit Zeitdauer zur Verfügung stellt.
      description_fr: |
        Une classe mixin qui fournit des slots pour modéliser des événements ou occurrences avec une durée.
    slots:
      - date_begin_actual
      - datetime_begin_actual
      - date_begin_planned
      - datetime_begin_planned
      - date_end_actual
      - datetime_end_actual
      - date_end_planned
      - datetime_end_planned

  HasCreationModificationDates:
    mixin: true
    description: |
      A mixin class that provides slots for modeling creation and modification dates of an entity.
    annotations:
      description_de: |
        Eine Mixin-Klasse, die Slots für die Modellierung von Erstellungs- und Änderungsdaten einer Entität zur Verfügung stellt.
      description_fr: |
        Une classe mixin qui fournit des slots pour modéliser les dates de création et de modification d'une entité.
    slots:
      - date_created
      - datetime_created
      - date_modified
      - datetime_modified

  IsProcessStep:
    mixin: true
    description: |
      A mixin class for a single step in a multi-stage process (e.g.,
      a deliberation step of an affair or a phase step of a consultation).
      Combines identification and event-duration slots and adds a free-text
      remark slot. Concrete step classes add their own type-specific slots.
    annotations:
      description_de: |
        Eine Mixin-Klasse für einen einzelnen Schritt in einem
        mehrstufigen Prozess (z. B. Bearbeitungsschritt eines Geschäfts oder
        Phasen­schritt einer Konsultation). Kombiniert Identifikations- und
        Zeitdauer-Slots und ergänzt einen freien Bemerkungs-Slot. Konkrete
        Step-Klassen ergänzen ihre eigenen typ-spezifischen Slots.
    # NOTE: the identification and event-duration slots are listed directly
    # rather than pulled in via `mixins: [HasIdentification, IsEventWithDuration]`.
    # LinkML (1.9.x) does not resolve mixins-of-a-mixin transitively, so a
    # consumer doing `mixins: [IsProcessStep]` would otherwise only inherit
    # `remark`. Listing the slots here keeps a single `mixins: [IsProcessStep]`
    # working for ConsultationStep (ech-0297) and the affair steps (ech-0295).
      description_fr: |
        Une classe mixin pour une étape unique dans un processus
        à plusieurs étapes (par ex. une étape de délibération d'une affaire ou
        une étape de phase d'une consultation). Combine les slots d'identification
        et de durée d'événement et ajoute un slot de remarque en texte libre.
        Les classes d'étape concrètes ajoutent leurs propres slots spécifiques au type.
    slots:
      # from HasIdentification
      - local_id
      - global_uri
      - wikidata_uri
      # from IsEventWithDuration
      - date_begin_actual
      - datetime_begin_actual
      - date_begin_planned
      - datetime_begin_planned
      - date_end_actual
      - datetime_end_actual
      - date_end_planned
      - datetime_end_planned
      # process-step specific
      - remark

  MultilingualValue:
    description: |
      A multilingual string with language specification.
    annotations:
      description_de: |
        Ein mehrsprachiger String mit Angabe der Sprache.
      description_fr: |
        Une chaîne de caractères multilingue avec indication de la langue.
    slots:
      - value
      - language
    slot_usage:
      value:
        required: true

  PersonReference:
    description: |
      Lightweight reference to a person with key identification data at time of linking. Preserves historical accuracy even if the person changes later.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Person mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung. Ermöglicht historische Korrektheit auch wenn sich die Person später ändert.
      description_fr: |
        Référence légère à une personne avec les principales données d'identification au moment de la liaison. Préserve l'exactitude historique même si la personne change ultérieurement.
    mixins:
      - HasIdentification
    slots:
      - label
      - label_long
      - group_label
    slot_usage:
      label:
        description: |
          Mandatory short display name to identify the person within the organisation (e.g. with added birth year to distinguish persons with the same name).
        annotations:
          description_de: |
            Obligatorischer Kurzname zur Identifikation der Person innerhalb der Organisation (z.B. mit Geburtsjahr zur Unterscheidung von Personen mit gleichem Namen).
          description_fr: |
            Nom d'affichage court obligatoire permettant d'identifier la personne au sein de l'organisation (par ex. avec l'ajout de l'année de naissance afin de distinguer les personnes portant le même nom).
        required: true
      label_long:
        description: |
          Optional long display name including academic titles and full official name (e.g. "Dr. Maria Muster-Beispiel").
        annotations:
          description_de: |
            Optionaler langer Anzeigename mit akademischen Titeln und vollständigem amtlichem Namen (z.B. "Dr. Maria Muster-Beispiel").

          description_fr: |
            Nom d'affichage long facultatif comprenant les titres académiques et le nom officiel complet (par ex. « Dr. Maria Muster-Beispiel »).
  GroupReference:
    description: |
      Lightweight reference to a group with key identification data at time of linking.
    annotations:
      description_de: |
        Leichtgewichtige Referenz auf eine Gruppe mit den wichtigsten Identifikationsmerkmalen zum Zeitpunkt der Verknüpfung.
      description_fr: |
        Référence légère à un groupe avec les principales données d'identification au moment de la liaison.
    mixins:
      - HasIdentification
    slots:
      - label
      - abbreviation

# SLOTS
# ----------------------------------------------------------------

slots:
  valid_from:
    slot_uri: schema:validFrom
    description: |
      The date from which the information is valid.
    annotations:
      description_de: |
        Das Datum, ab dem die Information gültig ist.
      description_fr: |
        La date à partir de laquelle l'information est valable.
    range: date

  valid_through:
    slot_uri: schema:validThrough
    description: |
      The date until which the information is valid, inclusive.
    annotations:
      description_de: |
        Das Datum, bis und mit dem die Information gültig ist.
      description_fr: |
        La date jusqu'à laquelle l'information est valable, incluse.
    range: date

  is_active:
    slot_uri: mcm:isCurrent
    description: |
      Indicates whether the information is currently valid. Can be useful when this information is explicitly available.
    annotations:
      description_de: |
        Gibt an, ob die Information aktuell gültig ist. Kann nützlich sein, wenn diese Information explizit vorhanden ist.
      description_fr: |
        Indique si l'information est actuellement valable. Peut être utile lorsque cette information est explicitement disponible.
    range: boolean

  local_id:
    slot_uri: mcm:localId
    description: |
      Local identifier. For example, a UUID from the council information system.
    annotations:
      description_de: |
        Lokaler Identifikator. Bspw. eine UUID aus dem Ratsinformationssystem.

      description_fr: |
        Identifiant local. Par exemple, un UUID issu du système d'information du conseil.
  global_uri:
    slot_uri: mcm:globalURI
    description: |
      A unique, globally valid URI for the entity.
    annotations:
      description_de: |
        Eine eindeutige, global gültige URI für die Entität.
      description_fr: |
        Une URI unique et globalement valide pour l'entité.
    range: uriorcurie
    identifier: true
    required: true

  wikidata_uri:
    slot_uri: mcm:wikidataUri
    description: |
      A URI that refers to a Wikidata entity, e.g. http://www.wikidata.org/entity/Q39 for Switzerland.
    annotations:
      description_de: |
        Eine URI, die auf eine Wikidata-Entität verweist, z.B. http://www.wikidata.org/entity/Q39 für die Schweiz.
      description_fr: |
        Une URI qui renvoie à une entité Wikidata, par ex. http://www.wikidata.org/entity/Q39 pour la Suisse.
    range: uriorcurie

  date_actual:
    slot_uri: mcm:dateActual
    description: |
      The actual date of an instantaneous event or occurrence (without time duration).
    annotations:
      description_de: |
        Das tatsächliche Datum eines instantanen Ereignisses oder Vorkommnissen (ohne Zeitdauer).
      description_fr: |
        La date effective d'un événement ou d'une occurrence instantané (sans durée).
    range: date

  datetime_actual:
    slot_uri: mcm:datetimeActual
    description: |
      The actual date and time of an instantaneous event or occurrence (without time duration).
    annotations:
      description_de: |
        Das tatsächliche Datum und die Uhrzeit eines instantanen Ereignisses oder Vorkommnissen (ohne Zeitdauer).
      description_fr: |
        La date et l'heure effectives d'un événement ou d'une occurrence instantané (sans durée).
    range: datetime

  date_planned:
    slot_uri: mcm:datePlanned
    description: |
      The planned date of an instantaneous event or occurrence (without time duration).
    annotations:
      description_de: |
        Das geplante Datum eines instantanen Ereignisses oder Vorkommnissen (ohne Zeitdauer).
      description_fr: |
        La date planifiée d'un événement ou d'une occurrence instantané (sans durée).
    range: date

  datetime_planned:
    slot_uri: mcm:datetimePlanned
    description: |
      The planned date and time of an instantaneous event or occurrence (without time duration).
    annotations:
      description_de: |
        Das geplante Datum und die Uhrzeit eines instantanen Ereignisses oder Vorkommnissen (ohne Zeitdauer).
      description_fr: |
        La date et l'heure planifiées d'un événement ou d'une occurrence instantané (sans durée).
    range: datetime

  date_begin_actual:
    slot_uri: mcm:dateBeginActual
    description: |
      The actual start date of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das tatsächliche Startdatum eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date de début effective d'un événement ou d'une occurrence avec durée.
    range: date

  datetime_begin_actual:
    slot_uri: mcm:datetimeBeginActual
    description: |
      The actual start date and time of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das tatsächliche Startdatum und die Uhrzeit eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date et l'heure de début effectives d'un événement ou d'une occurrence avec durée.
    range: datetime

  date_begin_planned:
    slot_uri: mcm:dateBeginPlanned
    description: |
      The planned start date of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das geplante Startdatum eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date de début planifiée d'un événement ou d'une occurrence avec durée.
    range: date

  datetime_begin_planned:
    slot_uri: mcm:datetimeBeginPlanned
    description: |
      The planned start date and time of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das geplante Startdatum und die Uhrzeit eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date et l'heure de début planifiées d'un événement ou d'une occurrence avec durée.
    range: datetime

  date_end_actual:
    slot_uri: mcm:dateEndActual
    description: |
      The actual end date of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das tatsächliche Enddatum eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date de fin effective d'un événement ou d'une occurrence avec durée.
    range: date

  datetime_end_actual:
    slot_uri: mcm:datetimeEndActual
    description: |
      The actual end date and time of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das tatsächliche Enddatum und die Uhrzeit eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date et l'heure de fin effectives d'un événement ou d'une occurrence avec durée.
    range: datetime

  date_end_planned:
    slot_uri: mcm:dateEndPlanned
    description: |
      The planned end date of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das geplante Enddatum eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date de fin planifiée d'un événement ou d'une occurrence avec durée.
    range: date

  datetime_end_planned:
    slot_uri: mcm:datetimeEndPlanned
    description: |
      The planned end date and time of an event or occurrence with time duration.
    annotations:
      description_de: |
        Das geplante Enddatum und die Uhrzeit eines Ereignisses oder Vorkommnissen mit Zeitdauer.
      description_fr: |
        La date et l'heure de fin planifiées d'un événement ou d'une occurrence avec durée.
    range: datetime

  date_created:
    slot_uri: mcm:dateCreated
    description: |
      The date when an entity was created.
    annotations:
      description_de: |
        Das Datum, an dem eine Entität erstellt wurde.
      description_fr: |
        La date à laquelle une entité a été créée.
    range: date

  datetime_created:
    slot_uri: mcm:datetimeCreated
    description: |
      The date and time when an entity was created.
    annotations:
      description_de: |
        Das Datum und die Uhrzeit, an dem eine Entität erstellt wurde.
      description_fr: |
        La date et l'heure auxquelles une entité a été créée.
    range: datetime

  date_modified:
    slot_uri: mcm:dateModified
    description: |
      The date when an entity was last modified.
    annotations:
      description_de: |
        Das Datum, an dem eine Entität zuletzt geändert wurde.
      description_fr: |
        La date à laquelle une entité a été modifiée pour la dernière fois.
    range: date

  datetime_modified:
    slot_uri: mcm:datetimeModified
    description: |
      The date and time when an entity was last modified.
    annotations:
      description_de: |
        Das Datum und die Uhrzeit, an dem eine Entität zuletzt geändert wurde.
      description_fr: |
        La date et l'heure auxquelles une entité a été modifiée pour la dernière fois.
    range: datetime

  multilingual_value:
    slot_uri: mcm:multilingualValue
    description: |
      A multilingual value with language specification.
    annotations:
      description_de: |
        Ein mehrsprachiger Wert mit Angabe der Sprache.
      description_fr: |
        Une valeur multilingue avec indication de la langue.
    range: MultilingualValue

  value:
    slot_uri: mcm:value
    description: |
      The value of an information besides other attributes such as type, language, etc.
    annotations:
      description_de: |
        Der eigentliche Wert einer Information neben weiteren attributen wie Typ, Sprache, etc.

      description_fr: |
        La valeur proprement dite d'une information, en plus d'autres attributs tels que le type, la langue, etc.
  language:
    slot_uri: mcm:language
    description: |
      Language code in ISO 639-1 format (two lowercase letters, e.g. "de", "fr", "it", "en").
    annotations:
      description_de: |
        Sprachcode im ISO 639-1 Format (zwei Kleinbuchstaben, z.B. "de", "fr", "it", "en").
      description_fr: |
        Code de langue au format ISO 639-1 (deux lettres minuscules, par ex. « de », « fr », « it », « en »).
    pattern: ^[a-z]{2}$

  label:
    slot_uri: mcm:label
    description: |
      Assign a label to a structured piece of information (e.g., display name, position, etc.).
    annotations:
      description_de: |
        Möglichkeit bei einer strukturierten Information, ein Label zu vergeben (bspw. Anzeigename, Anstellung, etc.).

      description_fr: |
        Attribuer un label à une information structurée (par ex. nom d'affichage, poste, etc.).
  label_long:
    slot_uri: mcm:labelLong
    description: |
      Assign an extended label to a structured piece of information (e.g., display name with title, position, etc.).
    annotations:
      description_de: |
        Möglichkeit bei einer strukturierten Information, ein erweitertesLabel zu vergeben (bspw. Anzeigename mit Titel, Anstellung, etc.).

      description_fr: |
        Attribuer un label étendu à une information structurée (par ex. nom d'affichage avec titre, poste, etc.).
  remark:
    slot_uri: mcm:remark
    description: |
      Free-text remark or note for edge cases or additional context on a process step or an entity.
    annotations:
      description_de: |
        Freitext-Bemerkung oder Notiz für Sonderfälle oder zusätzlichen Kontext zu einem Prozessschritt oder einer Entität.
      description_fr: |
        Remarque ou note en texte libre pour les cas particuliers ou pour un contexte supplémentaire relatif à une étape de processus ou à une entité.
    range: string

  group_label:
    slot_uri: mcm:groupLabel
    description: |
      Name of the body/group at time of linking.
    annotations:
      description_de: |
        Name des Gremiums zum Zeitpunkt der Verknüpfung.

      description_fr: |
        Nom de l'organe/du groupe au moment de la liaison.
  abbreviation:
    slot_uri: mcm:abbreviation
    range: MultilingualValue
    multivalued: true
    inlined_as_list: true
    description: |
      Abbreviation (can be multilingual).
    annotations:
      description_de: |
        Abkürzung (kann mehrsprachig sein).
      description_fr: |
        Abréviation (peut être multilingue).
