name: tutorial

on:
  push:
    paths:
      - 'tutorial/input/**'
  workflow_dispatch:

jobs:
  
  tutorial:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare output directory
        run: |
          rm -rf tutorial/output
          mkdir -p tutorial/output/docs

      - name: Generate LinkML artefacts
        run: |
          cd tutorial/input
          
          gen-owl --no-use-native-uris schema.yaml > ../output/schema.ttl
          gen-json-schema schema.yaml > ../output/schema.json

          for yaml_file in data_*.yaml; do
            base_name=$(basename "$yaml_file" .yaml)
            linkml-convert -s schema.yaml -t json "$yaml_file" > "../output/${base_name}.json"
            linkml-convert -s schema.yaml -t rdf "$yaml_file" > "../output/${base_name}.ttl"
          done

      - name: Extract examples from data files
        run: python .github/workflows/scripts/extract_examples.py tutorial
      
      - name: Generate LinkML documentation
        run: gen-doc tutorial/output/pipeline_examples_generator_schema.yaml --directory tutorial/output/docs --template-directory ech-0292_meta/input/docgen/en --example-directory tutorial/output/examples
      
      - name: Merge Markdown documentation
        run: python .github/workflows/scripts/merge_documentation.py tutorial
      
      - name: Install Pandoc
        run: sudo apt update && sudo apt install -y pandoc

      - name: Download Pandoc pagebreak Lua filter
        run: |
          curl -L https://raw.githubusercontent.com/pandoc-ext/pagebreak/refs/heads/main/pagebreak.lua \
          -o pagebreak.lua

      - name: Convert Markdown to Word with Pandoc
        run: |
          pandoc tutorial/output/documentation_merged.md \
          -o tutorial/output/tutorial.docx \
          --reference-doc=tutorial/input/template.docx \
          --lua-filter=pagebreak.lua

      - name: Commit and push changes
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add tutorial/output/
            git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated tutorial files"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            for attempt in 1 2 3 4 5; do
              git push "$REMOTE" HEAD:${{ github.ref }} && exit 0
              echo "Push rejected (attempt $attempt) — rebasing on ${{ github.ref_name }} and retrying"
              git pull --rebase "$REMOTE" ${{ github.ref_name }} || exit 1
              sleep $((RANDOM % 5 + 2))
            done
            echo "::error::Auto-generated push failed after 5 attempts" && exit 1
