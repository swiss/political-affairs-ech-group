name: ech-0294_actors

on:
  # Regenerate artifacts whenever source inputs for ech-0294 change.
  push:
    paths:
      - 'ech-0294_actors/input/**'
  workflow_dispatch:

jobs:
  
  ech-0294_actors:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare output directory
        run: |
          # Start from a clean output tree to avoid stale generated files.
          rm -rf ech-0294_actors/output
          mkdir -p ech-0294_actors/output/docs

      - name: Generate LinkML artefacts
        run: |
          cd ech-0294_actors/input
          
          # Canonical schema exports.
          gen-owl --no-use-native-uris schema.yaml > ../output/schema.ttl
          gen-json-schema schema.yaml > ../output/schema.json

          # Convert every example data_*.yaml to JSON and RDF.
          for yaml_file in data_*.yaml; do
            base_name=$(basename "$yaml_file" .yaml)
            linkml-convert -s schema.yaml -t json "$yaml_file" > "../output/${base_name}.json"
            linkml-convert -s schema.yaml -t rdf "$yaml_file" > "../output/${base_name}.ttl"
          done

      - name: Extract examples from data files
        # Inject examples into the schema used by gen-doc.
        run: python .github/workflows/scripts/extract_examples.py ech-0294_actors

      - name: Generate localized LinkML documentation (de, fr, en)
        run: |
          # Localized schema files are temporary helpers for docs only.
          # Keeping them outside output avoids committing schema_gen_* copies.
          TMP_SCHEMA_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_SCHEMA_DIR"' EXIT

          # The schema enriched by extract_examples.py is only needed for gen-doc.
          # Move it to temp so it does not remain as an output artifact.
          BASE_DOC_SCHEMA="$TMP_SCHEMA_DIR/pipeline_examples_generator_schema.yaml"
          mv ech-0294_actors/output/pipeline_examples_generator_schema.yaml "$BASE_DOC_SCHEMA"

          for lang in de fr en; do
            # English descriptions are already in the base schema.
            if [ "$lang" = "en" ]; then
              DOC_SCHEMA="$BASE_DOC_SCHEMA"
            else
              # For de/fr, localize descriptions (including local imports)
              # into a temporary schema consumed by gen-doc.
              DOC_SCHEMA="$TMP_SCHEMA_DIR/schema_gen_${lang}.yaml"
              python .github/workflows/scripts/localize_schema.py \
                "$BASE_DOC_SCHEMA" \
                "$lang" \
                "$DOC_SCHEMA"
            fi

            # Generate per-language markdown fragments used later for docx/pdf.
            gen-doc "$DOC_SCHEMA" \
              --directory "ech-0294_actors/output/docs/${lang}" \
              --template-directory "ech-0292_meta/input/docgen/${lang}" \
              --example-directory ech-0294_actors/output/examples
          done

      - name: Install Pandoc
        # Fixed Pandoc version for deterministic conversion output.
        run: |
          curl -fsSL https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-1-amd64.deb -o /tmp/pandoc.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Set up Typst (for PDF export)
        uses: typst-community/setup-typst@v4

      - name: Install Arial-compatible fonts (for PDF)
        run: sudo apt-get update -qq && sudo apt-get install -y fonts-liberation

      - name: Download Pandoc pagebreak Lua filter
        # Used by pandoc when producing docx/pdf outputs.
        run: |
          curl -L https://raw.githubusercontent.com/pandoc-ext/pagebreak/refs/heads/main/pagebreak.lua \
          -o pagebreak.lua

      - name: Merge, convert to Word and PDF per language (de, fr, en)
        run: |
          for lang in de fr en; do
            # Merge generated docs with hand-written language-specific content.
            python .github/workflows/scripts/merge_documentation.py ech-0294_actors "$lang"
            # Word (DOCX) — unchanged pipeline
            pandoc "ech-0294_actors/output/documentation_merged_${lang}.md" \
              -o "ech-0294_actors/output/ech-0294_actors_${lang}.docx" \
              --reference-doc=ech-0294_actors/input/template.docx \
              --lua-filter=pagebreak.lua
            python .github/workflows/scripts/set_docx_updatefields.py "ech-0294_actors/output/ech-0294_actors_${lang}.docx"
            python .github/workflows/scripts/shade_alternate_rows.py "ech-0294_actors/output/ech-0294_actors_${lang}.docx"
            # PDF via Typst (populated TOC, zebra, eCH branding)
            pandoc "ech-0294_actors/output/documentation_merged_${lang}.md" \
              -o "ech-0294_actors/output/ech-0294_actors_${lang}.pdf" \
              --pdf-engine=typst \
              --template=ech-0292_meta/input/typst-template.typ \
              --pdf-engine-opt=--root="$PWD" \
              --lua-filter=pagebreak.lua \
                --lua-filter=.github/workflows/scripts/fix_dangling_links.lua \
                --lua-filter=.github/workflows/scripts/toc_typst.lua
          done

      - name: Commit and push changes
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            # Commit only when generated output has changed.
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add ech-0294_actors/output/
            git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated ech-0294_actors files"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            # Retry push with rebase to handle concurrent updates.
            for attempt in 1 2 3 4 5; do
              git push "$REMOTE" HEAD:${{ github.ref }} && exit 0
              echo "Push rejected (attempt $attempt) — rebasing on ${{ github.ref_name }} and retrying"
              git pull --rebase "$REMOTE" ${{ github.ref_name }} || exit 1
              sleep $((RANDOM % 5 + 2))
            done
            echo "::error::Auto-generated push failed after 5 attempts" && exit 1
